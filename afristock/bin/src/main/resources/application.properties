server.port=8080

spring.application.name=Afristock

spring.datasource.url=jdbc:postgresql://localhost:5432/afristock
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false

logging.level.org.springframework=INFO
logging.level.org.hibernate=DEBUG

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.properties.hibernate.session_factory.statement_inspector=com.afristock.security.TenantStatementInspector
