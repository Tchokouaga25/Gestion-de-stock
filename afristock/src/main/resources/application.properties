server.port=8080

spring.application.name=Afristock

spring.datasource.url=jdbc:postgresql://localhost:5432/afristock
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driverClassName=org.postgresql.Driver

# Le schéma est désormais géré par Flyway (db/migration). Hibernate ne fait que valider.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.thymeleaf.cache=false

# Compte Super-Administrateur créé au premier démarrage (à changer en production !)
afristock.super-admin.email=${SUPER_ADMIN_EMAIL:admin@afristock.com}
afristock.super-admin.password=${SUPER_ADMIN_PASSWORD:ChangeMe123!}

logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
