<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Connexion — Afristock</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
            rel="stylesheet">
      <script>
          tailwind.config = {
            theme: {
              extend: {
                fontFamily: {
                  display: ['Sora', 'sans-serif'],
                  body: ['DM Sans', 'sans-serif'],
                },
                colors: {
                  navy: {
                    950: '#030d1f', 900: '#071530', 800: '#0c2347',
                    600: '#1a4a8a', 500: '#2563d4', 400: '#3b82f6', 100: '#dbeafe',
                  },
                  accent: { DEFAULT: '#00d4a0', dark: '#00a37c' },
                },
              }
            }
          }
      </script>

  </head>

  <body class="bg-center bg-cover no-repeat min-h-screen flex items-center justify-center p-6"
        th:style="'background-image: url(' + @{/images/logos.png} + ')'">
    <div class="absolute inset-0 bg-[#030d1f]/10"></div>
    <!-- On ajoute w-full et une hauteur fixe h-[500px] pour tester -->
    <div class="relative z-10 w-full max-w-4xl grid lg:grid-cols-2 rounded-3xl overflow-hidden shadow-2xl h-[550px]">

      <!-- Bloc de gauche (Image/Couleur) -->
        <div class="bg-emerald-600 flex items-center justify-center">
            <!-- Ajoutez le signe = et enlevez l'espace -->
            <img th:src="@{/images/background2.jpg}" class="w-full h-full object-cover"/>
        </div>

      <!-- Bloc de droite (Formulaire) -->
      <div class=" bg-white flex flex-col px-10 items-center justify-center">
         <!-- Header -->
          <div class="w-full mb-4">
              <div class="flex items-center gap-2 mb-3">
                  <div class="w-5 h-0.5 rounded-full bg-[#00d4a0]"></div>
                  <span class="font-display text-[10px] font-semibold tracking-[.08em] uppercase text-[#00a37c]">Connexion</span>
              </div>
              <p class="text-sm text-slate-500">
                  Pas encore de compte ?
                  <a th:href="@{/auth/register}" href="register.html" class="text-blue-600 font-semibold hover:underline">Créer un compte gratuit →</a>
              </p>
          </div>

          <!-- Thymeleaf alerts -->
          <div th:if="${message}" class="mb-2 flex items-center gap-2 text-sm text-blue-700 bg-blue-50 border border-blue-200 px-4 py-3 rounded-xl">
              <span>ℹ</span> <span th:text="${message}"></span>
          </div>
          <div th:if="${error}" class="mb-2 flex items-center gap-2 text-sm text-red-700 bg-red-50 border border-red-200 px-4 py-3 rounded-xl">
              <span>⚠</span> <span th:text="${error}"></span>
          </div>
          <div th:if="${success}" class="mb-2 flex items-center gap-2 text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 px-4 py-3 rounded-xl">
              <span>✓</span> <span th:text="${success}"></span>
          </div>

          <!-- Social login -->
          <div class="w-full grid grid-cols-2 gap-3 mb-2 items-center justify-center">
              <a href="#" class=" flex items-center justify-center gap-2 py-1 px-1 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 hover:border-slate-300 transition-all text-sm font-display font-semibold text-slate-700 no-underline">
                  <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                  Google
              </a>
              <a href="#" class="flex items-center justify-center gap-2 py-1 px-1 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 hover:border-slate-300 transition-all text-sm font-display font-semibold text-slate-700 no-underline">
                  <svg class="w-4 h-4 flex-shrink-0" style="fill:#0A66C2" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                  LinkedIn
              </a>
          </div>

          <!-- Divider -->
          <div class="w-full flex items-center gap-3 mb-3">
              <div class="flex-1 h-px bg-slate-200"></div>
              <span class="text-xs text-slate-400 font-medium whitespace-nowrap">ou par email</span>
              <div class="flex-1 h-px bg-slate-200"></div>
          </div>
          <!-- Form -->
          <form th:action="@{/auth/login}" method="post" class="w-full space-y-3" novalidate>

              <!-- Email -->
              <div class="flex flex-col gap-1.5">
                  <label class="font-display text-xs font-semibold text-slate-700 mb-1 " for="username">Adresse email</label>
                  <div class="relative">
                      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[13px] pointer-events-none select-none">✉</span>
                      <input type="email" id="username" name="username"
                             placeholder="vous@entreprise.com" autocomplete="email" required autofocus
                             class="af-input w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-xl bg-white text-slate-800 placeholder-slate-400">
                  </div>
              </div>

              <!-- Password -->
              <div class="flex flex-col gap-1.5">
                  <label class="font-display text-xs font-semibold text-slate-700 mb-1" for="password">Mot de passe</label>
                  <div class="relative">
                      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[13px] pointer-events-none select-none">🔒</span>
                      <input type="password" id="password" name="password"
                             placeholder="••••••••••" autocomplete="current-password" required
                             class="af-input w-full pl-9 pr-10 py-3 text-sm border border-slate-200 rounded-xl bg-white text-slate-800 placeholder-slate-400">
                      <button type="button" onclick="togglePwd('password',this)"
                              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-colors bg-transparent border-none cursor-pointer text-sm p-1">👁</button>
                  </div>
              </div>

              <!-- Remember / Forgot -->
              <div class="flex items-center justify-between">
                  <label class="af-check flex items-center gap-2 cursor-pointer select-none mb-1">
                      <input type="checkbox" name="remember-me" class="hidden">
                      <span class="af-box w-[17px] h-[17px] rounded-[5px] border border-slate-300 bg-white transition-all duration-200 text-[9px] flex-shrink-0"></span>
                      <span class="text-xs text-slate-600">Se souvenir de moi</span>
                  </label>
                  <a href="#" class="text-xs text-blue-600 font-medium hover:underline">Mot de passe oublié ?</a>
              </div>

              <!-- Submit -->
              <button type="submit"
                      class="btn-dark w-full py-3.5 bg-[#030d1f] text-white rounded-xl font-display text-sm font-bold tracking-wide border-none cursor-pointer mt-1">
                  <span class="relative z-10 flex items-center justify-center gap-2">Se connecter →</span>
              </button>

          </form>

      </div>
    </div>
  </body>
</html>
