<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Fournisseurs — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Fournisseurs — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Fournisseurs</h1>
                <p class="text-sm text-gray-500 mt-1">Vos partenaires d'approvisionnement.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/suppliers/add}" sec:authorize="hasAuthority('SUPPLIER_WRITE')"
                   class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouveau fournisseur
                </a>
            </div>
        </header>

        <form th:action="@{/suppliers}" method="get" class="mb-6">
            <input type="text" name="search" placeholder="Rechercher un fournisseur..."
                   class="form-input" style="max-width: 24rem;"/>
        </form>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Contact</th>
                        <th>Téléphone</th>
                        <th>Ville</th>
                        <th>Statut</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${suppliers}">
                        <td class="font-semibold text-gray-900" th:text="${s.name}">Nom</td>
                        <td th:text="${s.contactName}">Contact</td>
                        <td th:text="${s.phone}">Téléphone</td>
                        <td th:text="${s.city}">Ville</td>
                        <td>
                            <span th:if="${s.active}" class="badge badge-success">Actif</span>
                            <span th:unless="${s.active}" class="badge badge-neutral">Inactif</span>
                        </td>
                        <td class="text-right space-x-2">
                            <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" sec:authorize="hasAuthority('SUPPLIER_WRITE')"
                               class="btn-ghost">Modifier</a>
                            <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('SUPPLIER_DELETE')"
                                  onsubmit="return confirm('Supprimer ce fournisseur ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(suppliers)}">
                        <td colspan="6" class="table-empty">Aucun fournisseur.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
