<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead(${supplier.id == null} ? 'Nouveau fournisseur — Afristock' : 'Modifier le fournisseur — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" th:data-title="${supplier.id == null} ? 'Nouveau fournisseur — Afristock' : 'Modifier le fournisseur — Afristock'" class="max-w-2xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900"
                th:text="${supplier.id == null} ? 'Nouveau fournisseur' : 'Modifier le fournisseur'">Fournisseur</h1>
        </header>

        <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post"
              class="card p-8 space-y-5">
            <input type="hidden" th:field="*{id}"/>

            <div>
                <label class="form-label">Nom</label>
                <input type="text" th:field="*{name}" required class="form-input"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Personne à contacter</label>
                    <input type="text" th:field="*{contactName}" class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Téléphone</label>
                    <input type="text" th:field="*{phone}" class="form-input"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Ville</label>
                    <input type="text" th:field="*{city}" class="form-input"/>
                </div>
            </div>

            <div>
                <label class="form-label">Adresse</label>
                <input type="text" th:field="*{address}" class="form-input"/>
            </div>

            <div>
                <label class="form-label">Notes</label>
                <textarea th:field="*{notes}" rows="3" class="form-input"></textarea>
            </div>

            <label class="flex items-center gap-2 text-sm text-gray-700">
                <input type="checkbox" th:field="*{active}"/> Fournisseur actif
            </label>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/suppliers}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
