<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Collaborateurs — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Collaborateurs — Afristock" class="max-w-5xl mx-auto">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Collaborateurs</h1>
            <p class="text-sm text-gray-500 mt-1">Gérez les membres de votre équipe.</p>
        </div>
    </header>

    <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
    <div th:if="${error}"   class="mb-4 px-4 py-3 rounded-xl bg-red-50   text-red-700   text-sm" th:text="${error}"></div>

    <div class="grid grid-cols-3 gap-6">

        <!-- Liste des utilisateurs -->
        <div class="col-span-2 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Collaborateur</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Rôle</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="u : ${users}">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                                     style="background-color: #3341ff;"
                                     th:text="${#strings.substring(u.firstName, 0, 1)}">U</div>
                                <span class="font-medium text-gray-900"
                                      th:text="${u.firstName + ' ' + u.lastName}">Nom</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-500" th:text="${u.email}">email</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-50 text-blue-600"
                                  th:text="${u.role}">ROLE</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="3" class="px-6 py-10 text-center text-sm text-gray-400">
                            Aucun collaborateur pour le moment.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Formulaire d'invitation -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
            <h2 class="text-sm font-bold text-gray-900 mb-5">Inviter un collaborateur</h2>
            <form th:action="@{/admin/users/save}" method="post" th:object="${newUser}">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1.5">Prénom</label>
                        <input type="text" th:field="*{firstName}" required
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1.5">Nom</label>
                        <input type="text" th:field="*{lastName}" required
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1.5">Email</label>
                        <input type="email" th:field="*{email}" required
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1.5">Rôle</label>
                        <select th:field="*{role}"
                                class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                        </select>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-4">Mot de passe par défaut : <strong>Afristock123</strong></p>
                <button type="submit"
                        class="w-full mt-5 py-2.5 text-white text-sm font-semibold rounded-xl transition-colors"
                        style="background-color: #3341ff;">
                    Inviter
                </button>
            </form>
        </div>
    </div>
    </div>
    </main>
</body>
</html>
