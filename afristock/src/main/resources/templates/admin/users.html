<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Collaborateurs — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Collaborateurs — Afristock" class="max-w-5xl mx-auto">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Collaborateurs</h1>
            <p class="text-sm text-gray-500 mt-1">Gérez les membres de votre équipe.</p>
        </div>
    </header>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="grid grid-cols-3 gap-6">

        <!-- Liste des utilisateurs -->
        <div class="col-span-2 table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Collaborateur</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Site</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                                     style="background-color: #3341ff;"
                                     th:text="${#strings.substring(u.firstName, 0, 1)}">U</div>
                                <span class="font-medium text-gray-900"
                                      th:text="${u.firstName + ' ' + u.lastName}">Nom</span>
                            </div>
                        </td>
                        <td th:text="${u.email}">email</td>
                        <td>
                            <span class="badge badge-info" th:text="${u.role}">ROLE</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/site(id=${u.id})}" method="post" class="flex items-center gap-2">
                                <select name="siteId" class="form-input" style="min-width: 140px;" onchange="this.form.submit()">
                                    <option value="">Non affecté</option>
                                    <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}"
                                            th:selected="${u.site != null and u.site.id == s.id}">Site</option>
                                </select>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="4" class="table-empty">
                            Aucun collaborateur pour le moment.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Formulaire d'invitation -->
        <div class="card p-6">
            <h2 class="text-sm font-bold text-gray-900 mb-5">Inviter un collaborateur</h2>
            <form th:action="@{/admin/users/save}" method="post" th:object="${newUser}">
                <div class="space-y-4">
                    <div>
                        <label class="form-label">Prénom</label>
                        <input type="text" th:field="*{firstName}" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{lastName}" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Rôle</label>
                        <select th:field="*{role}" class="form-input">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                        </select>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-4">Mot de passe par défaut : <strong>Afristock123</strong></p>
                <button type="submit" class="btn btn-primary w-full mt-5">
                    Inviter
                </button>
            </form>
        </div>
    </div>
    </div>
    </main>
</body>
</html>
