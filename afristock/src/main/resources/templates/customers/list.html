<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Clients — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Clients — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Clients</h1>
                <p class="text-sm text-gray-500 mt-1">Particuliers et entreprises.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/customers/add}" sec:authorize="hasAuthority('CUSTOMER_WRITE')"
                   class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouveau client
                </a>
            </div>
        </header>

        <form th:action="@{/customers}" method="get" class="mb-6">
            <input type="text" name="search" placeholder="Rechercher un client..."
                   class="form-input" style="max-width: 24rem;"/>
        </form>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Type</th>
                        <th>Téléphone</th>
                        <th>Ville</th>
                        <th class="text-right">Plafond crédit</th>
                        <th class="text-right">Fidélité</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${customers}">
                        <td class="font-semibold text-gray-900" th:text="${c.name}">Nom</td>
                        <td>
                            <span th:if="${c.type.name() == 'ENTREPRISE'}" class="badge badge-neutral">Entreprise</span>
                            <span th:unless="${c.type.name() == 'ENTREPRISE'}" class="badge badge-info">Particulier</span>
                        </td>
                        <td th:text="${c.phone}">Téléphone</td>
                        <td th:text="${c.city}">Ville</td>
                        <td class="text-right" th:text="${#numbers.formatDecimal(c.creditLimit, 0, 0)} + ' FCFA'">0</td>
                        <td class="text-right" th:text="${c.loyaltyPoints}">0</td>
                        <td class="text-right space-x-2">
                            <a th:href="@{/customers/edit/{id}(id=${c.id})}" sec:authorize="hasAuthority('CUSTOMER_WRITE')"
                               class="btn-ghost">Modifier</a>
                            <form th:action="@{/customers/delete/{id}(id=${c.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('CUSTOMER_DELETE')"
                                  onsubmit="return confirm('Supprimer ce client ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="7" class="table-empty">Aucun client.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
