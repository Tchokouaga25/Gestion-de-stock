<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Clients — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Clients — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Clients</h1>
                <p class="text-sm text-gray-500 mt-1">Particuliers et entreprises.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/customers/add}" sec:authorize="hasAuthority('CUSTOMER_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouveau client</a>
            </div>
        </header>

        <form th:action="@{/customers}" method="get" class="mb-6">
            <input type="text" name="search" placeholder="Rechercher un client..."
                   class="w-full max-w-sm px-4 py-2.5 border border-gray-200 rounded-xl text-sm"/>
        </form>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Nom</th>
                        <th class="px-6 py-4">Type</th>
                        <th class="px-6 py-4">Téléphone</th>
                        <th class="px-6 py-4">Ville</th>
                        <th class="px-6 py-4 text-right">Plafond crédit</th>
                        <th class="px-6 py-4 text-right">Fidélité</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="c : ${customers}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${c.name}">Nom</td>
                        <td class="px-6 py-4">
                            <span th:if="${c.type.name() == 'ENTREPRISE'}" class="px-2.5 py-1 rounded-full bg-purple-50 text-purple-600 text-xs font-bold">Entreprise</span>
                            <span th:unless="${c.type.name() == 'ENTREPRISE'}" class="px-2.5 py-1 rounded-full bg-blue-50 text-blue-600 text-xs font-bold">Particulier</span>
                        </td>
                        <td class="px-6 py-4 text-gray-600" th:text="${c.phone}">Téléphone</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${c.city}">Ville</td>
                        <td class="px-6 py-4 text-right text-gray-700" th:text="${#numbers.formatDecimal(c.creditLimit, 0, 0)} + ' FCFA'">0</td>
                        <td class="px-6 py-4 text-right text-gray-700" th:text="${c.loyaltyPoints}">0</td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <a th:href="@{/customers/edit/{id}(id=${c.id})}" sec:authorize="hasAuthority('CUSTOMER_WRITE')"
                               class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Modifier</a>
                            <form th:action="@{/customers/delete/{id}(id=${c.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('CUSTOMER_DELETE')"
                                  onsubmit="return confirm('Supprimer ce client ?');">
                                <button class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="7" class="px-6 py-10 text-center text-gray-400">Aucun client.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
