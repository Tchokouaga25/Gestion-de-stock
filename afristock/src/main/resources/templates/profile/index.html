<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Mon Profil — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Mon Profil — Afristock" class="max-w-2xl mx-auto">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Mon Profil</h1>
            <p class="text-sm text-gray-500 mt-1">Gérez vos informations personnelles.</p>
        </div>
    </header>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card p-8">

        <!-- Avatar -->
        <div class="flex items-center gap-5 mb-8 pb-8 border-b border-gray-100">
            <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-bold"
                 style="background-color: #3341ff;"
                 th:text="${#strings.substring(profileUser.firstName, 0, 1)}">U</div>
            <div>
                <p class="text-lg font-bold text-gray-900"
                   th:text="${profileUser.firstName + ' ' + profileUser.lastName}">Prénom Nom</p>
                <p class="text-sm text-gray-400" th:text="${profileUser.email}">email@example.com</p>
                <span class="badge badge-info mt-1" th:text="${profileUser.role}">ROLE</span>
            </div>
        </div>

        <!-- Formulaire -->
        <form th:action="@{/profile/update}" method="post" th:object="${profileUser}">
            <input type="hidden" th:field="*{id}">

            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Prénom</label>
                        <input type="text" th:field="*{firstName}" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{lastName}" class="form-input">
                    </div>
                </div>

                <div>
                    <label class="form-label">Adresse email</label>
                    <input type="email" th:field="*{email}" class="form-input">
                </div>
            </div>

            <div class="mt-8 flex justify-end">
                <button type="submit" class="btn btn-primary">
                    Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>
    </div>
    </main>
</body>
</html>
