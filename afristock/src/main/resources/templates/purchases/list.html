<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Achats — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Achats — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Achats</h1>
                <p class="text-sm text-gray-500 mt-1">Commandes fournisseurs, réceptions et dettes.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/purchases/new}" sec:authorize="hasAuthority('PURCHASE_WRITE')" class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouvelle commande
                </a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Commande</th><th>Date</th><th>Fournisseur</th><th>Statut</th><th class="text-right">Total</th><th class="text-right">Dette</th><th class="text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td class="font-semibold text-gray-900" th:text="${o.reference}">CMD</td>
                        <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy')}">Date</td>
                        <td th:text="${o.supplier.name}">Fournisseur</td>
                        <td>
                            <span th:if="${o.status.name() == 'RECUE'}" class="badge badge-success">Reçue</span>
                            <span th:if="${o.status.name() == 'BROUILLON'}" class="badge badge-neutral">Brouillon</span>
                            <span th:if="${o.status.name() == 'ANNULEE'}" class="badge badge-danger">Annulée</span>
                        </td>
                        <td class="text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 0)}">0</td>
                        <td class="text-right" th:classappend="${o.balanceDue > 0} ? 'text-red-600 font-bold' : 'text-gray-400'" th:text="${#numbers.formatDecimal(o.balanceDue, 0, 0)}">0</td>
                        <td class="text-right"><a th:href="@{/purchases/{id}(id=${o.id})}" class="btn-ghost-info">Ouvrir</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}"><td colspan="7" class="table-empty">Aucune commande.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
