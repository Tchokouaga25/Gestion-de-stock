<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Achats — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Achats — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Achats</h1>
                <p class="text-sm text-gray-500 mt-1">Commandes fournisseurs, réceptions et dettes.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/purchases/new}" sec:authorize="hasAuthority('PURCHASE_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouvelle commande</a>
            </div>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Commande</th><th class="px-6 py-4">Date</th><th class="px-6 py-4">Fournisseur</th><th class="px-6 py-4">Statut</th><th class="px-6 py-4 text-right">Total</th><th class="px-6 py-4 text-right">Dette</th><th class="px-6 py-4 text-right">Action</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="o : ${orders}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${o.reference}">CMD</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy')}">Date</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${o.supplier.name}">Fournisseur</td>
                        <td class="px-6 py-4">
                            <span th:if="${o.status.name() == 'RECUE'}" class="px-2.5 py-1 rounded-full bg-green-50 text-green-600 text-xs font-bold">Reçue</span>
                            <span th:if="${o.status.name() == 'BROUILLON'}" class="px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 text-xs font-bold">Brouillon</span>
                            <span th:if="${o.status.name() == 'ANNULEE'}" class="px-2.5 py-1 rounded-full bg-red-50 text-red-600 text-xs font-bold">Annulée</span>
                        </td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 0)}">0</td>
                        <td class="px-6 py-4 text-right" th:classappend="${o.balanceDue > 0} ? 'text-red-600 font-bold' : 'text-gray-400'" th:text="${#numbers.formatDecimal(o.balanceDue, 0, 0)}">0</td>
                        <td class="px-6 py-4 text-right"><a th:href="@{/purchases/{id}(id=${o.id})}" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Ouvrir</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}"><td colspan="7" class="px-6 py-10 text-center text-gray-400">Aucune commande.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
