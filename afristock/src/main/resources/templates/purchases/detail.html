<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Commande ' + ${order.reference})}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" th:data-title="'Commande ' + ${order.reference}" class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900" th:text="${order.reference}">CMD</h1>
                <p class="text-sm text-gray-500 mt-1" th:text="${order.supplier.name} + ' → ' + ${order.site.name}">Fournisseur</p>
            </div>
            <a th:href="@{/purchases}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">← Achats</a>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-6">
            <table class="w-full text-sm mb-4">
                <thead class="text-gray-500 text-left text-xs uppercase tracking-widest border-b border-gray-200">
                    <tr><th class="py-2">Produit</th><th class="py-2 text-right">Qté</th><th class="py-2 text-right">Coût U.</th><th class="py-2 text-right">Total</th></tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${order.items}" class="border-b border-gray-100">
                        <td class="py-2 text-gray-900" th:text="${i.product.name}">Produit</td>
                        <td class="py-2 text-right text-gray-700" th:text="${i.quantity}">0</td>
                        <td class="py-2 text-right text-gray-700" th:text="${#numbers.formatDecimal(i.unitCost, 0, 0)}">0</td>
                        <td class="py-2 text-right text-gray-900 font-medium" th:text="${#numbers.formatDecimal(i.lineTotal, 0, 0)}">0</td>
                    </tr>
                </tbody>
            </table>
            <div class="flex flex-col items-end gap-1 text-sm">
                <div><span class="text-gray-500">Total : </span><span class="font-bold text-gray-900 text-lg" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 0)} + ' FCFA'">0</span></div>
                <div><span class="text-gray-500">Payé : </span><span class="text-gray-900" th:text="${#numbers.formatDecimal(order.amountPaid, 0, 0)} + ' FCFA'">0</span></div>
                <div th:if="${order.balanceDue > 0}"><span class="text-gray-500">Dette : </span><span class="text-red-600 font-bold" th:text="${#numbers.formatDecimal(order.balanceDue, 0, 0)} + ' FCFA'">0</span></div>
            </div>
        </div>

        <div class="flex flex-wrap gap-3" sec:authorize="hasAuthority('PURCHASE_WRITE')">
            <form th:if="${order.status.name() == 'BROUILLON'}" th:action="@{/purchases/{id}/receive(id=${order.id})}" method="post">
                <button class="px-5 py-2.5 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Réceptionner (crédite le stock)</button>
            </form>
            <form th:if="${order.status.name() == 'BROUILLON'}" th:action="@{/purchases/{id}/cancel(id=${order.id})}" method="post"
                  onsubmit="return confirm('Annuler cette commande ?');">
                <button class="px-5 py-2.5 bg-red-50 text-red-600 rounded-xl text-sm font-medium">Annuler</button>
            </form>
            <form th:if="${order.balanceDue > 0 and order.status.name() != 'ANNULEE'}" th:action="@{/purchases/{id}/pay(id=${order.id})}" method="post" class="flex gap-2 items-center">
                <input type="number" name="amount" min="1" step="1" placeholder="Montant" class="px-4 py-2.5 border border-gray-200 rounded-xl text-sm w-40"/>
                <button class="px-5 py-2.5 bg-green-50 text-green-600 rounded-xl text-sm font-medium">Payer</button>
            </form>
        </div>
    </div>
    </main>
</body>
</html>
