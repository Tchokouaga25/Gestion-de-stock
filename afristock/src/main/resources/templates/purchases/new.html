<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: pageHead('Nouvelle commande — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Nouvelle commande — Afristock" class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Nouvelle commande fournisseur</h1>
            <a th:href="@{/purchases}" class="btn btn-secondary">Retour</a>
        </header>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/purchases}" method="post" class="space-y-6">
            <div class="card p-6 grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Fournisseur</label>
                    <select name="supplierId" required class="form-input">
                        <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}">Fournisseur</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Site de réception</label>
                    <select name="siteId" required class="form-input">
                        <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                    </select>
                </div>
            </div>

            <div class="card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-900">Articles</h2>
                    <button type="button" onclick="addLine()" class="btn-ghost">
                        <i data-lucide="plus"></i> Ligne
                    </button>
                </div>
                <table class="w-full text-sm">
                    <thead class="text-gray-500 text-left text-xs uppercase tracking-widest">
                        <tr><th class="py-2">Produit</th><th class="py-2 w-28">Quantité</th><th class="py-2 w-32">Coût U.</th><th class="py-2 w-28 text-right">Total</th><th class="py-2 w-8"></th></tr>
                    </thead>
                    <tbody id="lines"></tbody>
                </table>
                <div class="text-right mt-4">
                    <span class="text-sm text-gray-500">Total : </span>
                    <span id="totalDisplay" class="text-xl font-bold text-gray-900">0</span>
                    <span class="text-sm text-gray-500"> FCFA</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Créer la commande</button>
        </form>

    <script th:inline="javascript">
    (function () {
        const products = /*[[${products}]]*/ [];
        const productData = products.map(p => ({ id: p.id, name: p.name, cost: p.purchasePrice || 0 }));
        function optionsHtml() {
            return productData.map(p => `<option value="${p.id}" data-cost="${p.cost}">${p.name}</option>`).join('');
        }
        function addLine() {
            const tr = document.createElement('tr');
            tr.className = 'border-t border-gray-100';
            const firstCost = productData[0]?.cost || 0;
            tr.innerHTML = `
                <td class="py-2"><select name="productId" onchange="onProductChange(this)" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">${optionsHtml()}</select></td>
                <td class="py-2"><input type="number" name="quantity" min="1" value="1" oninput="recompute()" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"/></td>
                <td class="py-2"><input type="number" name="unitCost" min="0" step="0.01" value="${firstCost}" oninput="recompute()" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"/></td>
                <td class="py-2 text-right line-cell text-gray-600">0</td>
                <td class="py-2 text-right"><button type="button" onclick="this.closest('tr').remove(); recompute();" class="text-red-500">✕</button></td>`;
            document.getElementById('lines').appendChild(tr);
            recompute();
        }
        function onProductChange(sel) {
            const cost = parseFloat(sel.selectedOptions[0]?.dataset.cost) || 0;
            sel.closest('tr').querySelector('input[name="unitCost"]').value = cost;
            recompute();
        }
        function recompute() {
            let total = 0;
            document.querySelectorAll('#lines tr').forEach(tr => {
                const qty = parseInt(tr.querySelector('input[name="quantity"]').value) || 0;
                const cost = parseFloat(tr.querySelector('input[name="unitCost"]').value) || 0;
                const line = qty * cost;
                tr.querySelector('.line-cell').textContent = line.toLocaleString('fr-FR');
                total += line;
            });
            document.getElementById('totalDisplay').textContent = total.toLocaleString('fr-FR');
        }

        window.addLine = addLine;
        window.onProductChange = onProductChange;
        window.recompute = recompute;

        addLine();
    })();
    </script>
    </div>
    </main>
</body>
</html>
