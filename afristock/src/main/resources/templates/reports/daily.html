<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapport du jour — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } @media print { .no-print { display:none; } body { background:white; } } </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Rapport de journée</h1>
                <p class="text-sm text-gray-500 mt-1" th:text="${#temporals.format(report.date, 'dd/MM/yyyy')}">Date</p>
            </div>
            <div class="flex gap-3 no-print">
                <form th:action="@{/reports}" method="get" class="flex gap-2 items-center">
                    <input type="date" name="date" th:value="${report.date}" class="px-3 py-2 border border-gray-200 rounded-xl text-sm"/>
                    <button class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Voir</button>
                </form>
                <a th:href="@{/reports/sales.xlsx(date=${report.date})}" class="px-4 py-2 bg-green-50 text-green-700 rounded-xl text-sm font-medium">Excel ventes</a>
                <a th:href="@{/reports/stock.xlsx}" class="px-4 py-2 bg-green-50 text-green-700 rounded-xl text-sm font-medium">Excel stock</a>
                <button onclick="window.print()" class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Imprimer / PDF</button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Ventes</div><div class="text-2xl font-bold text-gray-900 mt-1" th:text="${report.salesCount}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Chiffre d'affaires</div><div class="text-2xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(report.revenue, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Bénéfice brut</div><div class="text-2xl font-bold text-green-600 mt-1" th:text="${#numbers.formatDecimal(report.grossProfit, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Articles vendus</div><div class="text-2xl font-bold text-gray-900 mt-1" th:text="${report.itemsSold}">0</div></div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Facture</th><th class="px-6 py-4">Heure</th><th class="px-6 py-4">Client</th><th class="px-6 py-4">Paiement</th><th class="px-6 py-4 text-right">Total</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="s : ${report.sales}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${s.reference}">FAC</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(s.saleDate, 'HH:mm')}">Heure</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.customer != null ? s.customer.name : 'Comptoir'}">Client</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.paymentMethod}">Paiement</td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(s.totalAmount, 0, 0)}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(report.sales)}"><td colspan="5" class="px-6 py-10 text-center text-gray-400">Aucune vente ce jour.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
