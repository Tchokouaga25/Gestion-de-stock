<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caisse du jour — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Caisse du jour</h1>
                <p class="text-sm text-gray-500 mt-1">Récapitulatif des encaissements d'aujourd'hui.</p>
            </div>
            <a th:href="@{/sales}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Ventes</a>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-xs text-gray-400 uppercase tracking-widest">Total encaissé</div>
                <div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.totalEncaisse, 0, 0)}">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-xs text-gray-400 uppercase tracking-widest">Espèces</div>
                <div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.especes, 0, 0)}">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-xs text-gray-400 uppercase tracking-widest">Mobile Money</div>
                <div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.mobileMoney, 0, 0)}">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-xs text-gray-400 uppercase tracking-widest">Carte</div>
                <div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.carte, 0, 0)}">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-xs text-gray-400 uppercase tracking-widest">Crédit dû</div>
                <div class="text-xl font-bold text-red-600 mt-1" th:text="${#numbers.formatDecimal(summary.creditDu, 0, 0)}">0</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Facture</th><th class="px-6 py-4">Heure</th><th class="px-6 py-4">Paiement</th><th class="px-6 py-4 text-right">Encaissé</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="s : ${summary.sales}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${s.reference}">FAC</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(s.saleDate, 'HH:mm')}">Heure</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.paymentMethod}">Paiement</td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(s.amountPaid, 0, 0)}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(summary.sales)}"><td colspan="4" class="px-6 py-10 text-center text-gray-400">Aucune vente aujourd'hui.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
