<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Caisse du jour — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Caisse du jour — Afristock" class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Caisse du jour</h1>
                <p class="text-sm text-gray-500 mt-1">Récapitulatif des encaissements d'aujourd'hui.</p>
            </div>
            <a th:href="@{/sales}" class="btn btn-secondary">Ventes</a>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="stat-tile">
                <div class="stat-tile__icon bg-blue-50 text-blue-600"><i data-lucide="wallet"></i></div>
                <p class="stat-tile__label">Total encaissé</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.totalEncaisse, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-emerald-50 text-emerald-600"><i data-lucide="banknote"></i></div>
                <p class="stat-tile__label">Espèces</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.especes, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-purple-50 text-purple-600"><i data-lucide="smartphone"></i></div>
                <p class="stat-tile__label">Mobile Money</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.mobileMoney, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-orange-50 text-orange-600"><i data-lucide="credit-card"></i></div>
                <p class="stat-tile__label">Carte</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.carte, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-red-50 text-red-600"><i data-lucide="alert-triangle"></i></div>
                <p class="stat-tile__label">Crédit dû</p>
                <p class="stat-tile__value text-red-600" th:text="${#numbers.formatDecimal(summary.creditDu, 0, 0)}">0</p>
            </div>
        </div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Facture</th><th>Heure</th><th>Paiement</th><th class="text-right">Encaissé</th></tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${summary.sales}">
                        <td class="font-semibold text-gray-900" th:text="${s.reference}">FAC</td>
                        <td th:text="${#temporals.format(s.saleDate, 'HH:mm')}">Heure</td>
                        <td th:text="${s.paymentMethod}">Paiement</td>
                        <td class="text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(s.amountPaid, 0, 0)}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(summary.sales)}"><td colspan="4" class="table-empty">Aucune vente aujourd'hui.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
