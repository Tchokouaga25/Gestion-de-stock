<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Ventes — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Ventes — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Ventes</h1>
                <p class="text-sm text-gray-500 mt-1">Historique des factures.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/sales/cash}" class="btn btn-secondary">Caisse du jour</a>
                <a th:href="@{/sales/new}" sec:authorize="hasAuthority('SALE_WRITE')" class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouvelle vente
                </a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Facture</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Paiement</th>
                        <th class="text-right">Total</th>
                        <th class="text-right">Reste dû</th>
                        <th class="text-right">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${page.content}">
                        <td class="font-semibold text-gray-900" th:text="${s.reference}">FAC</td>
                        <td th:text="${#temporals.format(s.saleDate, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td th:text="${s.customer != null ? s.customer.name : 'Comptoir'}">Client</td>
                        <td th:text="${s.paymentMethod}">Paiement</td>
                        <td class="text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(s.totalAmount, 0, 0)}">0</td>
                        <td class="text-right" th:classappend="${s.balanceDue > 0} ? 'text-red-600 font-bold' : 'text-gray-400'"
                            th:text="${#numbers.formatDecimal(s.balanceDue, 0, 0)}">0</td>
                        <td class="text-right">
                            <a th:href="@{/sales/{id}(id=${s.id})}" class="btn-ghost-info">Reçu</a>
                        </td>
                    </tr>
                    <tr th:if="${page.content.isEmpty()}"><td colspan="7" class="table-empty">Aucune vente.</td></tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/layout :: pagination(${page}, '/sales', null)}"></div>
        </div>
    </div>
    </main>
</body>
</html>
