<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Ventes — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Ventes — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Ventes</h1>
                <p class="text-sm text-gray-500 mt-1">Historique des factures.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/sales/cash}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Caisse du jour</a>
                <a th:href="@{/sales/new}" sec:authorize="hasAuthority('SALE_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouvelle vente</a>
            </div>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Facture</th>
                        <th class="px-6 py-4">Date</th>
                        <th class="px-6 py-4">Client</th>
                        <th class="px-6 py-4">Paiement</th>
                        <th class="px-6 py-4 text-right">Total</th>
                        <th class="px-6 py-4 text-right">Reste dû</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="s : ${sales}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${s.reference}">FAC</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(s.saleDate, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.customer != null ? s.customer.name : 'Comptoir'}">Client</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.paymentMethod}">Paiement</td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${#numbers.formatDecimal(s.totalAmount, 0, 0)}">0</td>
                        <td class="px-6 py-4 text-right" th:classappend="${s.balanceDue > 0} ? 'text-red-600 font-bold' : 'text-gray-400'"
                            th:text="${#numbers.formatDecimal(s.balanceDue, 0, 0)}">0</td>
                        <td class="px-6 py-4 text-right">
                            <a th:href="@{/sales/{id}(id=${s.id})}" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Reçu</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sales)}"><td colspan="7" class="px-6 py-10 text-center text-gray-400">Aucune vente.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
