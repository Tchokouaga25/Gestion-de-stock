<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: pageHead('Facture ' + ${sale.reference})}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" th:data-title="'Facture ' + ${sale.reference}" class="max-w-2xl mx-auto">
        <style>
            @media print {
                .no-print { display: none !important; }
                aside { display: none !important; }
                main { margin-left: 0 !important; }
                body { background: white; }
            }
        </style>
        <div class="no-print flex justify-between items-center mb-6">
            <a th:href="@{/sales}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">← Retour</a>
            <button onclick="window.print()" class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Imprimer / PDF</button>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 p-10">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${sale.company != null ? sale.company.name : 'Facture'}">Entreprise</h1>
                    <p class="text-sm text-gray-500 mt-1" th:text="'Site : ' + ${sale.site.name}">Site</p>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold text-gray-900" th:text="${sale.reference}">FAC</div>
                    <div class="text-sm text-gray-500" th:text="${#temporals.format(sale.saleDate, 'dd/MM/yyyy HH:mm')}">Date</div>
                </div>
            </div>

            <div class="mb-6 text-sm">
                <span class="text-gray-500">Client : </span>
                <span class="font-medium text-gray-900" th:text="${sale.customer != null ? sale.customer.name : 'Comptoir (anonyme)'}">Client</span>
            </div>

            <table class="w-full text-sm mb-6">
                <thead class="text-gray-500 text-left text-xs uppercase tracking-widest border-b border-gray-200">
                    <tr><th class="py-2">Produit</th><th class="py-2 text-right">Qté</th><th class="py-2 text-right">Prix U.</th><th class="py-2 text-right">Total</th></tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${sale.items}" class="border-b border-gray-100">
                        <td class="py-2 text-gray-900" th:text="${i.product.name}">Produit</td>
                        <td class="py-2 text-right text-gray-700" th:text="${i.quantity}">1</td>
                        <td class="py-2 text-right text-gray-700" th:text="${#numbers.formatDecimal(i.unitPrice, 0, 0)}">0</td>
                        <td class="py-2 text-right text-gray-900 font-medium" th:text="${#numbers.formatDecimal(i.lineTotal, 0, 0)}">0</td>
                    </tr>
                </tbody>
            </table>

            <div class="flex flex-col items-end gap-1 text-sm">
                <div><span class="text-gray-500">Total : </span><span class="font-bold text-gray-900 text-lg" th:text="${#numbers.formatDecimal(sale.totalAmount, 0, 0)} + ' FCFA'">0</span></div>
                <div><span class="text-gray-500">Encaissé : </span><span class="text-gray-900" th:text="${#numbers.formatDecimal(sale.amountPaid, 0, 0)} + ' FCFA'">0</span></div>
                <div th:if="${sale.balanceDue > 0}"><span class="text-gray-500">Reste dû : </span><span class="text-red-600 font-bold" th:text="${#numbers.formatDecimal(sale.balanceDue, 0, 0)} + ' FCFA'">0</span></div>
                <div class="text-xs text-gray-400 mt-1" th:text="'Paiement : ' + ${sale.paymentMethod}">Paiement</div>
            </div>

            <p class="text-center text-xs text-gray-400 mt-10">Merci de votre confiance — AfriStock</p>
        </div>
    </div>
    </main>
</body>
</html>
