<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Employés — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Employés — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Employés</h1>
                <p class="text-sm text-gray-500 mt-1">Gestion du personnel.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/hr/leaves}" class="btn btn-secondary">
                    <i data-lucide="calendar-days"></i> Congés
                </a>
                <a th:href="@{/hr/attendance}" class="btn btn-secondary">
                    <i data-lucide="clock"></i> Pointage
                </a>
                <a th:href="@{/hr/employees/add}" sec:authorize="hasAuthority('HR_WRITE')"
                   class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouvel employé
                </a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-tile">
                <div class="stat-tile__icon bg-blue-50 text-blue-600"><i data-lucide="users"></i></div>
                <p class="stat-tile__label">Effectif</p>
                <p class="stat-tile__value" th:text="${kpis.headcount()}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-amber-50 text-amber-600"><i data-lucide="calendar-days"></i></div>
                <p class="stat-tile__label">En congé aujourd'hui</p>
                <p class="stat-tile__value" th:text="${kpis.onLeaveToday()}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-emerald-50 text-emerald-600"><i data-lucide="check-circle"></i></div>
                <p class="stat-tile__label">Taux de présence (30j)</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(kpis.attendanceRate(), 1, 0)} + ' %'">0 %</p>
            </div>
        </div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th></th><th>Nom</th><th>Email</th><th>Poste</th><th>Contrat</th><th>Téléphone</th><th class="text-right">Salaire</th><th>Taux de présence</th><th class="text-right">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${employeeRows}" th:with="e=${row.employee()}">
                        <td><span th:replace="~{fragments/layout :: avatarInitials(${e.fullName}, 'avatar-initials--sm')}">AB</span></td>
                        <td class="font-semibold text-gray-900" th:text="${e.fullName}">Nom</td>
                        <td th:text="${e.email}">email@exemple.com</td>
                        <td th:text="${e.position}">Poste</td>
                        <td th:text="${e.contractType}">Contrat</td>
                        <td th:text="${e.phone}">Téléphone</td>
                        <td class="text-right" th:text="${e.baseSalary != null ? #numbers.formatDecimal(e.baseSalary, 0, 0) : '—'}">0</td>
                        <td>
                            <div class="flex items-center gap-2">
                                <div class="perf-bar">
                                    <div th:class="${row.perfBarFillClass()}"
                                         th:style="'width:' + ${row.attendanceRate()} + '%'"></div>
                                </div>
                                <span class="text-12 text-gray-500" th:text="${#numbers.formatDecimal(row.attendanceRate(), 1, 0)} + ' %'">0 %</span>
                            </div>
                        </td>
                        <td class="text-right space-x-2">
                            <a th:href="@{/hr/employees/edit/{id}(id=${e.id})}" sec:authorize="hasAuthority('HR_WRITE')" class="btn-ghost">Modifier</a>
                            <form th:action="@{/hr/employees/delete/{id}(id=${e.id})}" method="post" class="inline" sec:authorize="hasAuthority('HR_WRITE')" onsubmit="return confirm('Supprimer cet employé ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employeeRows)}"><td colspan="9" class="table-empty">Aucun employé.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
