<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead(${employee.id == null} ? 'Nouvel employé' : 'Modifier employé')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" th:data-title="${employee.id == null} ? 'Nouvel employé' : 'Modifier employé'" class="max-w-2xl mx-auto">
        <header class="mb-8"><h1 class="text-2xl font-bold text-gray-900"
            th:text="${employee.id == null} ? 'Nouvel employé' : 'Modifier employé'">Employé</h1></header>

        <form th:action="@{/hr/employees/save}" th:object="${employee}" method="post"
              class="card p-8 space-y-5">
            <input type="hidden" th:field="*{id}"/>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="form-label">Prénom</label>
                    <input type="text" th:field="*{firstName}" required class="form-input"/></div>
                <div><label class="form-label">Nom</label>
                    <input type="text" th:field="*{lastName}" required class="form-input"/></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="form-label">Poste</label>
                    <input type="text" th:field="*{position}" class="form-input"/></div>
                <div><label class="form-label">Contrat</label>
                    <select th:field="*{contractType}" class="form-input">
                        <option th:each="c : ${contractTypes}" th:value="${c}" th:text="${c}">Contrat</option>
                    </select></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="form-label">Date d'embauche</label>
                    <input type="date" th:field="*{hireDate}" class="form-input"/></div>
                <div><label class="form-label">Salaire de base</label>
                    <input type="number" step="1" th:field="*{baseSalary}" class="form-input"/></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="form-label">Téléphone</label>
                    <input type="text" th:field="*{phone}" class="form-input"/></div>
                <div><label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-input"/></div>
            </div>
            <label class="flex items-center gap-2 text-sm text-gray-700"><input type="checkbox" th:field="*{active}"/> Employé actif</label>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/hr/employees}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
