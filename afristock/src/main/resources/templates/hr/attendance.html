<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Pointage — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Pointage — Afristock" class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Pointage</h1>
                <p class="text-sm text-gray-500 mt-1" th:text="'Journée du ' + ${#temporals.format(date, 'dd/MM/yyyy')}">Date</p>
            </div>
            <form th:action="@{/hr/attendance}" method="get" class="flex gap-2 items-center">
                <input type="date" name="date" th:value="${date}" class="form-input"/>
                <button class="btn btn-secondary">Voir</button>
            </form>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Employé</th><th>État</th><th class="text-right">Pointer</th></tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${employees}">
                        <td class="font-semibold text-gray-900" th:text="${e.fullName}">Employé</td>
                        <td>
                            <th:block th:each="a : ${attendances}" th:if="${a.employee.id == e.id}">
                                <span th:if="${a.present}" class="badge badge-success">Présent</span>
                                <span th:unless="${a.present}" class="badge badge-danger">Absent</span>
                            </th:block>
                        </td>
                        <td class="text-right space-x-2" sec:authorize="hasAuthority('HR_WRITE')">
                            <form th:action="@{/hr/attendance}" method="post" class="inline">
                                <input type="hidden" name="employeeId" th:value="${e.id}"/>
                                <input type="hidden" name="date" th:value="${date}"/>
                                <input type="hidden" name="present" value="true"/>
                                <button class="btn-ghost-info">Présent</button>
                            </form>
                            <form th:action="@{/hr/attendance}" method="post" class="inline">
                                <input type="hidden" name="employeeId" th:value="${e.id}"/>
                                <input type="hidden" name="date" th:value="${date}"/>
                                <input type="hidden" name="present" value="false"/>
                                <button class="btn-ghost-danger">Absent</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}"><td colspan="3" class="table-empty">Aucun employé.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
