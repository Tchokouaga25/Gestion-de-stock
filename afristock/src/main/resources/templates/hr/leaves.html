<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Congés — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Congés — Afristock" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Congés & absences</h1>
            <a th:href="@{/hr/employees}" class="btn btn-secondary">
                <i data-lucide="users"></i> Employés
            </a>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/hr/leaves}" method="post" sec:authorize="hasAuthority('HR_WRITE')"
              class="card p-6 mb-6 grid grid-cols-2 md:grid-cols-5 gap-3 items-end">
            <div>
                <label class="form-label">Employé</label>
                <select name="employeeId" required class="form-input">
                    <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.fullName}">Employé</option>
                </select>
            </div>
            <div>
                <label class="form-label">Type</label>
                <select name="type" class="form-input">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t}">Type</option>
                </select>
            </div>
            <div>
                <label class="form-label">Du</label>
                <input type="date" name="startDate" required class="form-input"/>
            </div>
            <div>
                <label class="form-label">Au</label>
                <input type="date" name="endDate" required class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">
                <i data-lucide="send"></i> Demander
            </button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Employé</th><th>Type</th><th>Période</th><th>Statut</th><th class="text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${leaves}">
                        <td class="font-semibold text-gray-900" th:text="${l.employee.fullName}">Employé</td>
                        <td th:text="${l.type}">Type</td>
                        <td th:text="${#temporals.format(l.startDate,'dd/MM/yyyy')} + ' → ' + ${#temporals.format(l.endDate,'dd/MM/yyyy')}">Période</td>
                        <td>
                            <span th:if="${l.status.name() == 'APPROUVE'}" class="badge badge-success">Approuvé</span>
                            <span th:if="${l.status.name() == 'REFUSE'}" class="badge badge-danger">Refusé</span>
                            <span th:if="${l.status.name() == 'EN_ATTENTE'}" class="badge badge-warning">En attente</span>
                        </td>
                        <td class="text-right space-x-2" sec:authorize="hasAuthority('HR_WRITE')" th:if="${l.status.name() == 'EN_ATTENTE'}">
                            <form th:action="@{/hr/leaves/{id}/status(id=${l.id})}" method="post" class="inline">
                                <input type="hidden" name="status" value="APPROUVE"/>
                                <button class="btn-ghost-info">Approuver</button>
                            </form>
                            <form th:action="@{/hr/leaves/{id}/status(id=${l.id})}" method="post" class="inline">
                                <input type="hidden" name="status" value="REFUSE"/>
                                <button class="btn-ghost-danger">Refuser</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(leaves)}"><td colspan="5" class="table-empty">Aucune demande.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
