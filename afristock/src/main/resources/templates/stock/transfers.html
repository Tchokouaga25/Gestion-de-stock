<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des transferts — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Historique des transferts</h1>
            <a th:href="@{/stock}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Stock par site</a>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Date</th>
                        <th class="px-6 py-4">Produit</th>
                        <th class="px-6 py-4">De</th>
                        <th class="px-6 py-4">Vers</th>
                        <th class="px-6 py-4 text-right">Quantité</th>
                        <th class="px-6 py-4">Motif</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="t : ${transfers}">
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(t.transferredAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${t.product.name}">Produit</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${t.fromSite.name}">De</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${t.toSite.name}">Vers</td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${t.quantity}">0</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${t.reason}">Motif</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(transfers)}"><td colspan="6" class="px-6 py-10 text-center text-gray-400">Aucun transfert.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
