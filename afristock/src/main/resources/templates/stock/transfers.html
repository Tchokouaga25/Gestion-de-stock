<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Historique des transferts — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Historique des transferts — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Historique des transferts</h1>
            <a th:href="@{/stock}" class="btn btn-secondary">Stock par site</a>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Produit</th>
                        <th>De</th>
                        <th>Vers</th>
                        <th class="text-right">Quantité</th>
                        <th>Motif</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${transfers}">
                        <td th:text="${#temporals.format(t.transferredAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="font-semibold text-gray-900" th:text="${t.product.name}">Produit</td>
                        <td th:text="${t.fromSite.name}">De</td>
                        <td th:text="${t.toSite.name}">Vers</td>
                        <td class="text-right font-bold" th:text="${t.quantity}">0</td>
                        <td th:text="${t.reason}">Motif</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(transfers)}"><td colspan="6" class="table-empty">Aucun transfert.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
