<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Alertes de rupture — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Alertes de rupture — Afristock" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Alertes de rupture</h1>
                <p class="text-sm text-gray-500 mt-1">Produits au niveau ou sous le seuil d'alerte, par site.</p>
            </div>
            <a th:href="@{/stock}" class="btn btn-secondary">Stock par site</a>
        </header>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Site</th><th>Produit</th><th class="text-right">Stock</th><th class="text-right">Seuil</th><th>État</th></tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${levels}">
                        <td class="font-semibold text-gray-900" th:text="${l.site.name}">Site</td>
                        <td th:text="${l.product.name}">Produit</td>
                        <td class="text-right font-bold" th:classappend="${l.quantity == 0} ? 'text-red-600' : 'text-orange-500'" th:text="${l.quantity}">0</td>
                        <td class="text-right text-gray-500" th:text="${l.product.minThreshold}">0</td>
                        <td>
                            <span th:if="${l.quantity == 0}" class="badge badge-danger">Rupture</span>
                            <span th:unless="${l.quantity == 0}" class="badge badge-warning">Stock bas</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(levels)}"><td colspan="5" class="table-empty">Aucune alerte : tous les stocks sont au-dessus du seuil. <i data-lucide="party-popper"></i></td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
