<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Transfert de stock — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Transfert de stock — Afristock" class="max-w-2xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Transfert de stock</h1>
            <p class="text-sm text-gray-500 mt-1">Déplacer un produit d'un site vers un autre (ex: entrepôt → boutique).</p>
        </header>

        <form th:action="@{/stock/transfer}" method="post"
              class="card p-8 space-y-5">
            <div>
                <label class="form-label">Produit</label>
                <select name="productId" required class="form-input">
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}">Produit</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Site source</label>
                    <select name="fromSiteId" required class="form-input">
                        <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Site destination</label>
                    <select name="toSiteId" required class="form-input">
                        <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Quantité</label>
                    <input type="number" name="quantity" min="1" required class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Motif (optionnel)</label>
                    <input type="text" name="reason" class="form-input"/>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn btn-primary">Transférer</button>
                <a th:href="@{/stock}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
