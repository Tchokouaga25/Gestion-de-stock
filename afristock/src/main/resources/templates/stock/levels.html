<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock par site — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Stock par site</h1>
                <p class="text-sm text-gray-500 mt-1">Quantités disponibles dans chaque boutique / entrepôt.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/dashboard}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Tableau de bord</a>
                <a th:href="@{/stock/transfer}" sec:authorize="hasAuthority('STOCK_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Transfert</a>
                <a th:href="@{/stock/transfers}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Historique</a>
            </div>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <!-- Ajuster / initialiser le stock d'un produit dans un site -->
        <form th:action="@{/stock/adjust}" method="post" sec:authorize="hasAuthority('STOCK_WRITE')"
              class="bg-white rounded-2xl border border-gray-100 p-6 mb-6 grid grid-cols-4 gap-3 items-end">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Produit</label>
                <select name="productId" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}">Produit</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Site</label>
                <select name="siteId" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">
                    <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Quantité</label>
                <input type="number" name="quantity" min="0" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <button type="submit" class="px-5 py-2.5 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Définir le stock</button>
        </form>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Site</th><th class="px-6 py-4">Produit</th><th class="px-6 py-4 text-right">Quantité</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="l : ${levels}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${l.site.name}">Site</td>
                        <td class="px-6 py-4 text-gray-700" th:text="${l.product.name}">Produit</td>
                        <td class="px-6 py-4 text-right text-gray-900 font-bold" th:text="${l.quantity}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(levels)}"><td colspan="3" class="px-6 py-10 text-center text-gray-400">Aucun stock défini. Utilisez le formulaire ci-dessus.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
