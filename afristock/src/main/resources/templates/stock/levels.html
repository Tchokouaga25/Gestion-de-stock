<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Stock par site — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Stock par site — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Stock par site</h1>
                <p class="text-sm text-gray-500 mt-1">Quantités disponibles dans chaque boutique / entrepôt.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/stock/transfer}" sec:authorize="hasAuthority('STOCK_WRITE')"
                   class="btn btn-primary">Transfert</a>
                <a th:href="@{/stock/transfers}" class="btn btn-secondary">Historique</a>
                <a th:href="@{/stock/alerts}" class="btn btn-secondary">Alertes</a>
                <a th:href="@{/losses}" class="btn btn-secondary">Pertes</a>
                <a th:href="@{/inventory}" class="btn btn-secondary">Inventaire</a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Ajuster / initialiser le stock d'un produit dans un site -->
        <form th:action="@{/stock/adjust}" method="post" sec:authorize="hasAuthority('STOCK_WRITE')"
              class="card p-6 mb-6 grid grid-cols-4 gap-3 items-end">
            <div>
                <label class="form-label">Produit</label>
                <select name="productId" required class="form-input">
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}">Produit</option>
                </select>
            </div>
            <div>
                <label class="form-label">Site</label>
                <select name="siteId" required class="form-input">
                    <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                </select>
            </div>
            <div>
                <label class="form-label">Quantité</label>
                <input type="number" name="quantity" min="0" required class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">Définir le stock</button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Site</th><th>Produit</th><th class="text-right">Quantité</th></tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${levels}">
                        <td class="font-semibold text-gray-900" th:text="${l.site.name}">Site</td>
                        <td th:text="${l.product.name}">Produit</td>
                        <td class="text-right font-bold" th:text="${l.quantity}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(levels)}"><td colspan="3" class="table-empty">Aucun stock défini. Utilisez le formulaire ci-dessus.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
