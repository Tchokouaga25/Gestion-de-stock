<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Pertes — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Pertes — Afristock" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Pertes (périmés / avariés)</h1>
                <p class="text-sm text-gray-500 mt-1">Déclarer une perte ajuste automatiquement le stock du site.</p>
            </div>
            <a th:href="@{/stock}" class="btn btn-secondary">Stock par site</a>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/losses}" method="post" sec:authorize="hasAuthority('STOCK_WRITE')"
              class="card p-6 mb-6 grid grid-cols-5 gap-3 items-end">
            <div>
                <label class="form-label">Produit</label>
                <select name="productId" required class="form-input">
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}">Produit</option>
                </select>
            </div>
            <div>
                <label class="form-label">Site</label>
                <select name="siteId" required class="form-input">
                    <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                </select>
            </div>
            <div>
                <label class="form-label">Type</label>
                <select name="type" required class="form-input">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.name() == 'PERIME'} ? 'Périmé' : 'Avarié'">Type</option>
                </select>
            </div>
            <div>
                <label class="form-label">Quantité</label>
                <input type="number" name="quantity" min="1" required class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">Déclarer</button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Date</th><th>Produit</th><th>Site</th><th>Type</th><th class="text-right">Qté</th><th>Motif</th></tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${losses}">
                        <td th:text="${#temporals.format(l.declaredAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="font-semibold text-gray-900" th:text="${l.product.name}">Produit</td>
                        <td th:text="${l.site.name}">Site</td>
                        <td>
                            <span th:if="${l.type.name() == 'PERIME'}" class="badge badge-warning">Périmé</span>
                            <span th:unless="${l.type.name() == 'PERIME'}" class="badge badge-danger">Avarié</span>
                        </td>
                        <td class="text-right font-bold" th:text="${l.quantity}">0</td>
                        <td th:text="${l.reason}">Motif</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(losses)}"><td colspan="6" class="table-empty">Aucune perte déclarée.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
