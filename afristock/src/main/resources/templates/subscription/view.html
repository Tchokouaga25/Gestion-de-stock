<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Mon abonnement — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Mon abonnement — Afristock" class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Mon abonnement</h1>
        </header>

        <div th:if="${subscription == null}" class="bg-white rounded-2xl border border-gray-100 p-10 text-center text-gray-400">
            Aucun abonnement actif. Contactez l'administrateur de la plateforme.
        </div>

        <div th:if="${subscription != null}" class="bg-white rounded-2xl border border-gray-100 p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <div class="text-xs text-gray-400 uppercase tracking-widest">Offre</div>
                    <div class="text-2xl font-bold text-gray-900" th:text="${subscription.planName}">Offre</div>
                </div>
                <span th:switch="${subscription.effectiveStatus.name()}">
                    <span th:case="'ACTIF'" class="px-3 py-1 rounded-full bg-green-50 text-green-600 text-xs font-bold">Actif</span>
                    <span th:case="'ESSAI'" class="px-3 py-1 rounded-full bg-orange-50 text-orange-600 text-xs font-bold">Essai gratuit</span>
                    <span th:case="'EXPIRE'" class="px-3 py-1 rounded-full bg-red-50 text-red-600 text-xs font-bold">Expiré</span>
                </span>
            </div>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div><div class="text-gray-400">Début</div><div class="font-medium text-gray-900" th:text="${#temporals.format(subscription.startDate, 'dd/MM/yyyy')}">Date</div></div>
                <div><div class="text-gray-400">Échéance</div><div class="font-medium text-gray-900" th:text="${#temporals.format(subscription.endDate, 'dd/MM/yyyy')}">Date</div></div>
            </div>
            <p th:if="${subscription.expired}" class="mt-6 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm">
                Votre abonnement a expiré. Veuillez le renouveler auprès de l'administrateur de la plateforme.
            </p>
        </div>
    </div>
    </main>
</body>
</html>
