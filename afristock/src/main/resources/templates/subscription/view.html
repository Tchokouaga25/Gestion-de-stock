<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Mon abonnement — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Mon abonnement — Afristock" class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Mon abonnement</h1>
        </header>

        <div th:if="${subscription == null}" class="workspace-card">
            <div class="workspace-card__body text-center text-gray-400">
                Aucun abonnement actif. Contactez l'administrateur de la plateforme.
            </div>
        </div>

        <div th:if="${subscription != null}" class="workspace-card">
            <div class="workspace-card__body">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div class="text-xs text-gray-400 uppercase tracking-widest">Offre</div>
                        <div class="text-2xl font-bold text-gray-900" th:text="${subscription.planName}">Offre</div>
                    </div>
                    <span th:switch="${subscription.effectiveStatus.name()}">
                        <span th:case="'ACTIF'" class="badge badge-success">Actif</span>
                        <span th:case="'ESSAI'" class="badge badge-info">Essai gratuit</span>
                        <span th:case="'EXPIRE'" class="badge badge-danger">Expiré</span>
                    </span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-tile">
                        <div class="stat-tile__label">Début</div>
                        <div class="stat-tile__value" th:text="${#temporals.format(subscription.startDate, 'dd/MM/yyyy')}">Date</div>
                    </div>
                    <div class="stat-tile">
                        <div class="stat-tile__label">Échéance</div>
                        <div class="stat-tile__value" th:text="${#temporals.format(subscription.endDate, 'dd/MM/yyyy')}">Date</div>
                    </div>
                </div>
                <p th:if="${subscription.expired}" class="alert alert-error mt-6">
                    Votre abonnement a expiré. Veuillez le renouveler auprès de l'administrateur de la plateforme.
                </p>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
