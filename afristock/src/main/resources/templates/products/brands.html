<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Marques — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Marques — Afristock" class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Marques</h1>
            <a th:href="@{/products}" class="btn btn-secondary">Retour aux produits</a>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/products/brands/save}" th:object="${newBrand}" method="post"
              class="card p-6 mb-6 flex gap-3 items-end">
            <div class="flex-1">
                <label class="form-label">Nouvelle marque</label>
                <input type="text" th:field="*{name}" required placeholder="Nom" class="form-input"/>
            </div>
            <div class="flex-1">
                <input type="text" th:field="*{description}" placeholder="Description (optionnel)" class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Nom</th><th>Description</th><th class="text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${brands}">
                        <td class="font-semibold text-gray-900" th:text="${b.name}">Nom</td>
                        <td th:text="${b.description}">Description</td>
                        <td class="text-right">
                            <form th:action="@{/products/brands/delete/{id}(id=${b.id})}" method="post" class="inline"
                                  onsubmit="return confirm('Supprimer cette marque ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(brands)}"><td colspan="3" class="table-empty">Aucune marque.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
