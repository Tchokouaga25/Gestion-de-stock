<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Variantes — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Variantes — Afristock" class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Variantes</h1>
                <p class="text-sm text-gray-500 mt-1" th:text="'Produit : ' + ${product.name}">Produit</p>
            </div>
            <a th:href="@{/products}" class="btn btn-secondary">Retour aux produits</a>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/products/{id}/variants/save(id=${product.id})}" th:object="${newVariant}" method="post"
              sec:authorize="hasAuthority('PRODUCT_WRITE')"
              class="card p-6 mb-6 flex gap-3 items-end">
            <div class="flex-1">
                <label class="form-label">Libellé</label>
                <input type="text" th:field="*{name}" required placeholder="ex: 500ml, Taille L" class="form-input"/>
            </div>
            <div class="flex-1">
                <label class="form-label">Code-barres</label>
                <input type="text" th:field="*{barcode}" class="form-input"/>
            </div>
            <div class="w-40">
                <label class="form-label">Ajust. prix</label>
                <input type="number" step="0.01" th:field="*{priceAdjustment}" class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Libellé</th><th>Code-barres</th><th class="text-right">Ajust. prix</th><th class="text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${variants}">
                        <td class="font-semibold text-gray-900" th:text="${v.name}">Libellé</td>
                        <td th:text="${v.barcode}">Code</td>
                        <td class="text-right" th:text="${v.priceAdjustment}">0</td>
                        <td class="text-right">
                            <form th:action="@{/products/{id}/variants/delete/{vid}(id=${product.id},vid=${v.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('PRODUCT_WRITE')"
                                  onsubmit="return confirm('Supprimer cette variante ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(variants)}"><td colspan="4" class="table-empty">Aucune variante.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
