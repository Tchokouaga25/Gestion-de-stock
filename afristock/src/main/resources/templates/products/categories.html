<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catégories — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Catégories</h1>
            <a th:href="@{/products}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Retour aux produits</a>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <form th:action="@{/products/categories/save}" th:object="${newCategory}" method="post"
              class="bg-white rounded-2xl border border-gray-100 p-6 mb-6 flex gap-3 items-end">
            <div class="flex-1">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Nouvelle catégorie</label>
                <input type="text" th:field="*{name}" required placeholder="Nom" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <div class="flex-1">
                <input type="text" th:field="*{description}" placeholder="Description (optionnel)" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <button type="submit" class="px-5 py-2.5 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Ajouter</button>
        </form>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Nom</th><th class="px-6 py-4">Description</th><th class="px-6 py-4 text-right">Action</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="c : ${categories}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${c.name}">Nom</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${c.description}">Description</td>
                        <td class="px-6 py-4 text-right">
                            <form th:action="@{/products/categories/delete/{id}(id=${c.id})}" method="post" class="inline"
                                  onsubmit="return confirm('Supprimer cette catégorie ?');">
                                <button class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}"><td colspan="3" class="px-6 py-10 text-center text-gray-400">Aucune catégorie.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
