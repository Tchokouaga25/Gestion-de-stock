<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Produits — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Produits — Afristock" class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Produits</h1>
                <p class="text-sm text-gray-500 mt-1">Catalogue de l'entreprise.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/products/categories}" sec:authorize="hasAuthority('PRODUCT_WRITE')" class="btn btn-secondary">Catégories</a>
                <a th:href="@{/products/brands}" sec:authorize="hasAuthority('PRODUCT_WRITE')" class="btn btn-secondary">Marques</a>
                <a th:href="@{/products/add}" sec:authorize="hasAuthority('PRODUCT_WRITE')" class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouveau produit
                </a>
            </div>
        </header>

        <form th:action="@{/products}" method="get" class="mb-6">
            <input type="text" name="search" placeholder="Rechercher un produit..."
                   class="form-input" style="max-width: 24rem;"/>
        </form>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Nom</th>
                        <th>Marque</th>
                        <th>Catégorie</th>
                        <th class="text-right">Prix vente</th>
                        <th class="text-right">Stock</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.reference}">REF</td>
                        <td class="font-semibold text-gray-900" th:text="${p.name}">Nom</td>
                        <td th:text="${p.brand != null ? p.brand.name : '—'}">Marque</td>
                        <td th:text="${p.category != null ? p.category.name : '—'}">Catégorie</td>
                        <td class="text-right" th:text="${p.salePrice}">0</td>
                        <td class="text-right">
                            <span th:classappend="${p.minThreshold != null and p.currentQuantity != null and p.currentQuantity <= p.minThreshold} ? 'text-red-600 font-bold' : ''"
                                  th:text="${p.currentQuantity}">0</span>
                        </td>
                        <td class="text-right space-x-2">
                            <a th:href="@{/products/{id}/variants(id=${p.id})}" class="btn-ghost-info">Variantes</a>
                            <a th:href="@{/products/edit/{id}(id=${p.id})}" sec:authorize="hasAuthority('PRODUCT_WRITE')"
                               class="btn-ghost">Modifier</a>
                            <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('PRODUCT_DELETE')"
                                  onsubmit="return confirm('Supprimer ce produit ?');">
                                <button class="btn-ghost-danger">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="7" class="table-empty">Aucun produit.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
