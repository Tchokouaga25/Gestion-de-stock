<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Produits — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Produits — Afristock" class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Produits</h1>
                <p class="text-sm text-gray-500 mt-1">Catalogue de l'entreprise.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/products/categories}" sec:authorize="hasAuthority('PRODUCT_WRITE')" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Catégories</a>
                <a th:href="@{/products/brands}" sec:authorize="hasAuthority('PRODUCT_WRITE')" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Marques</a>
                <a th:href="@{/products/add}" sec:authorize="hasAuthority('PRODUCT_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouveau produit</a>
            </div>
        </header>

        <form th:action="@{/products}" method="get" class="mb-6">
            <input type="text" name="search" placeholder="Rechercher un produit..."
                   class="w-full max-w-sm px-4 py-2.5 border border-gray-200 rounded-xl text-sm"/>
        </form>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Référence</th>
                        <th class="px-6 py-4">Nom</th>
                        <th class="px-6 py-4">Marque</th>
                        <th class="px-6 py-4">Catégorie</th>
                        <th class="px-6 py-4 text-right">Prix vente</th>
                        <th class="px-6 py-4 text-right">Stock</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="p : ${products}">
                        <td class="px-6 py-4 text-gray-600" th:text="${p.reference}">REF</td>
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${p.name}">Nom</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${p.brand != null ? p.brand.name : '—'}">Marque</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${p.category != null ? p.category.name : '—'}">Catégorie</td>
                        <td class="px-6 py-4 text-right text-gray-700" th:text="${p.salePrice}">0</td>
                        <td class="px-6 py-4 text-right">
                            <span th:classappend="${p.minThreshold != null and p.currentQuantity != null and p.currentQuantity <= p.minThreshold} ? 'text-red-600 font-bold' : 'text-gray-700'"
                                  th:text="${p.currentQuantity}">0</span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <a th:href="@{/products/{id}/variants(id=${p.id})}" class="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-medium">Variantes</a>
                            <a th:href="@{/products/edit/{id}(id=${p.id})}" sec:authorize="hasAuthority('PRODUCT_WRITE')"
                               class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Modifier</a>
                            <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('PRODUCT_DELETE')"
                                  onsubmit="return confirm('Supprimer ce produit ?');">
                                <button class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="7" class="px-6 py-10 text-center text-gray-400">Aucun produit.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
