<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Entreprises — Super Admin')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebarSuperAdmin}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Entreprises — Super Admin" class="max-w-7xl mx-auto">

        <div th:replace="~{fragments/layout :: topbarSuperAdmin('Entreprises', 'Espace Super-Administrateur — gestion des entreprises clientes.')}"></div>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div th:if="${#lists.isEmpty(companies)}" class="bg-white rounded-2xl border border-gray-100 p-10 text-center text-gray-400">
            Aucune entreprise pour le moment.
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div th:each="c : ${companies}" class="bg-white rounded-2xl border border-gray-100 p-6 flex flex-col">

                <div class="flex items-start justify-between mb-4" th:with="words=${#strings.arraySplit(#strings.trim(c.name),' ')}">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 font-bold flex items-center justify-center text-sm"
                             th:text="${#strings.substring(words[0],0,1)} + ${words.length > 1 ? #strings.substring(words[words.length-1],0,1) : ''}">AB</div>
                        <div>
                            <h3 class="text-[15px] font-bold text-gray-900 leading-tight" th:text="${c.name}">Nom</h3>
                            <p class="text-12 text-gray-400" th:text="${c.city ?: 'Ville non renseignée'}">Ville</p>
                        </div>
                    </div>
                    <span th:if="${c.active}" class="px-3 py-1 rounded-full bg-green-50 text-green-600 text-10 font-bold uppercase tracking-wide">Active</span>
                    <span th:unless="${c.active}" class="px-3 py-1 rounded-full bg-red-50 text-red-600 text-10 font-bold uppercase tracking-wide">Suspendue</span>
                </div>

                <p class="text-12 text-gray-500 mb-4" th:text="${c.email}">email</p>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-50 rounded-xl px-3 py-2.5">
                        <p class="text-10 text-gray-400 font-bold uppercase tracking-widest">Localisations</p>
                        <p class="text-lg font-bold text-gray-900" th:text="${siteCounts.get(c.id)}">0</p>
                    </div>
                    <div class="bg-gray-50 rounded-xl px-3 py-2.5">
                        <p class="text-10 text-gray-400 font-bold uppercase tracking-widest">Personnel</p>
                        <p class="text-lg font-bold text-gray-900" th:text="${staffCounts.get(c.id)}">0</p>
                    </div>
                </div>

                <div class="text-12 mb-4" th:with="sub=${subscriptions.get(c.id)}">
                    <th:block th:if="${sub != null}">
                        <span class="font-semibold text-gray-700" th:text="${sub.planName}">Offre</span>
                        <span th:if="${sub.effectiveStatus.name() == 'EXPIRE'}" class="text-red-600 font-bold">(Expiré)</span>
                        <span th:if="${sub.effectiveStatus.name() == 'ESSAI'}" class="text-orange-500 font-bold">(Essai)</span>
                        <span th:if="${sub.effectiveStatus.name() == 'ACTIF'}" class="text-green-600 font-bold">(Actif)</span>
                        <span class="text-gray-400 block" th:text="'jusqu\'au ' + ${#temporals.format(sub.endDate, 'dd/MM/yyyy')}">fin</span>
                    </th:block>
                    <span th:unless="${sub != null}" class="text-gray-400">Pas d'abonnement</span>
                </div>

                <a th:href="@{/super-admin/companies/{id}(id=${c.id})}" data-spa-link data-nav-key="superadmin-companies"
                   class="text-center w-full px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-sm font-medium mb-3 hover:bg-indigo-100">
                    Voir le détail →
                </a>

                <div class="mt-auto pt-3 border-t border-gray-100 space-y-2">
                    <div class="flex gap-2">
                        <form th:if="${c.active}" th:action="@{/super-admin/companies/{id}/suspend(id=${c.id})}" method="post" class="flex-1">
                            <button class="w-full px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Suspendre</button>
                        </form>
                        <form th:unless="${c.active}" th:action="@{/super-admin/companies/{id}/activate(id=${c.id})}" method="post" class="flex-1">
                            <button class="w-full px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs font-medium">Réactiver</button>
                        </form>
                    </div>
                    <form th:action="@{/super-admin/companies/{id}/subscribe(id=${c.id})}" method="post" class="flex gap-1 items-center">
                        <select name="planId" class="flex-1 px-2 py-1 border border-gray-200 rounded text-xs">
                            <option th:each="p : ${plans}" th:value="${p.id}" th:text="${p.name}">Offre</option>
                        </select>
                        <input type="number" name="months" value="1" min="1" class="w-14 px-2 py-1 border border-gray-200 rounded text-xs"/>
                        <button class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-xs font-medium whitespace-nowrap">Abonner</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
