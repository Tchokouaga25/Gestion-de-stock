<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entreprises — Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Entreprises</h1>
                <p class="text-sm text-gray-500 mt-1">Espace Super-Administrateur — gestion des entreprises clientes.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/super-admin/features}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Fonctionnalités</a>
                <form th:action="@{/logout}" method="post">
                    <button class="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-sm font-medium">Déconnexion</button>
                </form>
            </div>
        </header>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Entreprise</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Ville</th>
                        <th class="px-6 py-4">Statut</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="c : ${companies}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${c.name}">Nom</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${c.email}">email</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${c.city}">Ville</td>
                        <td class="px-6 py-4">
                            <span th:if="${c.active}" class="px-3 py-1 rounded-full bg-green-50 text-green-600 text-xs font-bold">Active</span>
                            <span th:unless="${c.active}" class="px-3 py-1 rounded-full bg-red-50 text-red-600 text-xs font-bold">Suspendue</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <form th:if="${c.active}" th:action="@{/super-admin/companies/{id}/suspend(id=${c.id})}" method="post" class="inline">
                                <button class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Suspendre</button>
                            </form>
                            <form th:unless="${c.active}" th:action="@{/super-admin/companies/{id}/activate(id=${c.id})}" method="post" class="inline">
                                <button class="px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs font-medium">Réactiver</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(companies)}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-400">Aucune entreprise pour le moment.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
