<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Fonctionnalités — Super Admin')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebarSuperAdmin}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Fonctionnalités — Super Admin" class="max-w-7xl mx-auto">

        <div th:replace="~{fragments/layout :: topbarSuperAdmin('Fonctionnalités', 'Activez, modifiez ou supprimez les fonctionnalités disponibles pour les entreprises clientes.')}"></div>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <!-- Ajouter une fonctionnalité -->
        <details class="bg-white rounded-2xl border border-gray-100 mb-8 group">
            <summary class="cursor-pointer list-none px-6 py-4 flex items-center justify-between select-none">
                <span class="text-sm font-bold text-gray-900">➕ Ajouter une fonctionnalité</span>
                <span class="text-gray-400 text-xs group-open:rotate-180 transition-transform">▼</span>
            </summary>
            <form th:action="@{/super-admin/features}" th:object="${newFeature}" method="post"
                  class="px-6 pb-6 grid grid-cols-1 md:grid-cols-4 gap-3 items-end border-t border-gray-100 pt-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Code technique</label>
                    <input type="text" name="code" required placeholder="EX_MODULE"
                           class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nom</label>
                    <input type="text" name="name" required placeholder="Nom affiché"
                           class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Catégorie</label>
                    <input type="text" name="category" placeholder="Ex: Ventes"
                           class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Description</label>
                    <input type="text" name="description" placeholder="Description courte"
                           class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
                </div>
                <div class="md:col-span-4">
                    <button type="submit" class="px-4 py-2.5 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Créer la fonctionnalité</button>
                </div>
            </form>
        </details>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="f : ${features}" class="bg-white rounded-2xl border border-gray-100 p-6 flex flex-col">
                <div class="flex justify-between items-start mb-3">
                    <span class="px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold" th:text="${f.category ?: 'Général'}">Catégorie</span>

                    <!-- Toggle visuel (checkbox caché + label stylé, sans JS) -->
                    <form th:action="@{/super-admin/features/{id}/toggle(id=${f.id})}" method="post">
                        <input type="hidden" name="enabled" th:value="${!f.enabled}"/>
                        <button type="submit" class="block" th:attr="aria-label=${f.enabled ? 'Désactiver' : 'Activer'}">
                            <span th:class="${f.enabled} ? 'relative inline-flex h-6 w-11 items-center rounded-full bg-green-500 transition-colors' : 'relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 transition-colors'">
                                <span th:class="${f.enabled} ? 'inline-block h-4 w-4 transform translate-x-6 rounded-full bg-white shadow transition-transform' : 'inline-block h-4 w-4 transform translate-x-1 rounded-full bg-white shadow transition-transform'"></span>
                            </span>
                        </button>
                    </form>
                </div>

                <h3 class="text-lg font-bold text-gray-900" th:text="${f.name}">Nom</h3>
                <p class="text-10 text-gray-400 font-mono mt-1" th:text="${f.code}">CODE</p>
                <p class="text-sm text-gray-500 mt-2 flex-1" th:text="${f.description}">Description</p>
                <p class="text-xs font-bold mt-3" th:classappend="${f.enabled} ? 'text-green-600' : 'text-gray-400'"
                   th:text="${f.enabled} ? 'ACTIVÉE' : 'DÉSACTIVÉE'">Statut</p>

                <div class="flex gap-2 mt-5">
                    <details class="flex-1 group/edit">
                        <summary class="cursor-pointer list-none w-full px-4 py-2 bg-gray-50 text-gray-700 rounded-xl text-sm font-medium text-center select-none">
                            ✏️ Modifier
                        </summary>
                        <form th:action="@{/super-admin/features/{id}/update(id=${f.id})}" method="post" class="mt-3 space-y-2">
                            <input type="text" name="name" th:value="${f.name}" required
                                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"/>
                            <input type="text" name="category" th:value="${f.category}" placeholder="Catégorie"
                                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"/>
                            <textarea name="description" placeholder="Description" rows="2"
                                      class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" th:text="${f.description}"></textarea>
                            <button type="submit" class="w-full px-3 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-medium">Enregistrer</button>
                        </form>
                    </details>

                    <form th:action="@{/super-admin/features/{id}/delete(id=${f.id})}" method="post"
                          onsubmit="return confirm('Supprimer définitivement cette fonctionnalité ?');">
                        <button type="submit" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-sm font-medium">🗑️ Supprimer</button>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(features)}" class="col-span-full text-center text-gray-400 py-10">
                Aucune fonctionnalité définie pour le moment.
            </div>
        </div>
    </div>
    </main>
</body>
</html>
