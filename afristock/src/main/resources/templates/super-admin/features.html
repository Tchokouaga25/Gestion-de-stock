<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Fonctionnalités — Super Admin')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebarSuperAdmin}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Fonctionnalités — Super Admin" class="max-w-7xl mx-auto">

        <div th:replace="~{fragments/layout :: topbarSuperAdmin('Fonctionnalités', 'Activez, modifiez ou supprimez les fonctionnalités disponibles pour les entreprises clientes.')}"></div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Ajouter une fonctionnalité -->
        <details class="card mb-8 group">
            <summary class="cursor-pointer list-none px-6 py-4 flex items-center justify-between select-none">
                <span class="text-sm font-bold text-gray-900 flex items-center gap-2"><i data-lucide="plus"></i> Ajouter une fonctionnalité</span>
                <i data-lucide="chevron-down" class="text-gray-400 group-open:rotate-180 transition-transform"></i>
            </summary>
            <form th:action="@{/super-admin/features}" th:object="${newFeature}" method="post"
                  class="px-6 pb-6 grid grid-cols-1 md:grid-cols-4 gap-3 items-end border-t border-gray-100 pt-4">
                <div>
                    <label class="form-label">Code technique</label>
                    <input type="text" name="code" required placeholder="EX_MODULE"
                           class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Nom</label>
                    <input type="text" name="name" required placeholder="Nom affiché"
                           class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Catégorie</label>
                    <input type="text" name="category" placeholder="Ex: Ventes"
                           class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Description</label>
                    <input type="text" name="description" placeholder="Description courte"
                           class="form-input"/>
                </div>
                <div class="md:col-span-4">
                    <button type="submit" class="btn btn-primary">Créer la fonctionnalité</button>
                </div>
            </form>
        </details>

        <div class="workspace-card">
            <div class="workspace-card__header">
                <span class="workspace-card__title flex items-center gap-2">
                    <i data-lucide="shield" class="text-emerald-500" style="width:16px;height:16px;"></i>
                    Console de gestion des fonctionnalités (Admin)
                </span>
            </div>
            <div class="workspace-card__body">

                <div class="flex items-start gap-3 bg-amber-50 border border-amber-200 text-amber-800 rounded-lg px-4 py-3 mb-6 text-sm">
                    <i data-lucide="alert-triangle" class="shrink-0 mt-0.5" style="width:16px;height:16px;"></i>
                    <span>Note&nbsp;: ces réglages affectent instantanément l'expérience des entreprises clientes. À manipuler avec précaution en tant qu'administrateur plateforme.</span>
                </div>

                <div th:each="f : ${features}" class="flex items-center justify-between gap-4 py-4 border-b border-slate-100 last:border-b-0">
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-1 flex-wrap">
                            <span class="badge badge-info" th:text="${f.category ?: 'Général'}">Catégorie</span>
                            <h3 class="text-sm font-bold text-slate-900" th:text="${f.name}">Nom</h3>
                        </div>
                        <p class="text-xs text-slate-500" th:text="${f.description}">Description</p>
                    </div>

                    <div class="flex items-center gap-1 shrink-0">
                        <details class="relative group/edit">
                            <summary class="topbar-icon-btn cursor-pointer select-none list-none" aria-label="Modifier">
                                <i data-lucide="pencil"></i>
                            </summary>
                            <form th:action="@{/super-admin/features/{id}/update(id=${f.id})}" method="post"
                                  class="absolute right-0 mt-2 w-64 bg-white border border-slate-200 rounded-xl shadow-lg p-3 space-y-2 z-10">
                                <input type="text" name="name" th:value="${f.name}" required
                                       class="form-input"/>
                                <input type="text" name="category" th:value="${f.category}" placeholder="Catégorie"
                                       class="form-input"/>
                                <textarea name="description" placeholder="Description" rows="2"
                                          class="form-input" th:text="${f.description}"></textarea>
                                <button type="submit" class="btn-ghost-info w-full justify-center">Enregistrer</button>
                            </form>
                        </details>

                        <form th:action="@{/super-admin/features/{id}/delete(id=${f.id})}" method="post"
                              onsubmit="return confirm('Supprimer définitivement cette fonctionnalité ?');">
                            <button type="submit" class="topbar-icon-btn" aria-label="Supprimer"><i data-lucide="trash-2"></i></button>
                        </form>

                        <!-- Toggle visuel (checkbox caché + label stylé, sans JS) -->
                        <form th:action="@{/super-admin/features/{id}/toggle(id=${f.id})}" method="post">
                            <input type="hidden" name="enabled" th:value="${!f.enabled}"/>
                            <button type="submit" class="block ml-2" th:attr="aria-label=${f.enabled ? 'Désactiver' : 'Activer'}">
                                <span th:class="${f.enabled} ? 'relative inline-flex h-6 w-11 items-center rounded-full bg-green-500 transition-colors' : 'relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 transition-colors'">
                                    <span th:class="${f.enabled} ? 'inline-block h-4 w-4 transform translate-x-6 rounded-full bg-white shadow transition-transform' : 'inline-block h-4 w-4 transform translate-x-1 rounded-full bg-white shadow transition-transform'"></span>
                                </span>
                            </button>
                        </form>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(features)}" class="text-center text-gray-400 py-10">
                    Aucune fonctionnalité définie pour le moment.
                </div>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
