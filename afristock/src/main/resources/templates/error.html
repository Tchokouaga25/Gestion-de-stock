<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-10 max-w-md w-full text-center">
        <div class="text-5xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-gray-900">
            Une erreur est survenue
        </h1>
        <p class="text-sm text-gray-500 mt-2">
            <span th:if="${status}" th:text="${status}">500</span>
            <span th:if="${error}" th:text="${error}">Erreur interne</span>
        </p>
        <p class="text-sm text-gray-600 mt-4" th:if="${message}" th:text="${message}"></p>
        <a th:href="@{/dashboard}" class="inline-block mt-6 px-5 py-2.5 bg-brand-600 text-white rounded-xl text-sm font-medium"
           style="background-color:#3341ff">Retour au tableau de bord</a>
    </div>
</body>
</html>
