<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style> body { background-color: #F8F9FD; } </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="card p-10 max-w-md w-full text-center">
        <div class="flex items-center justify-center mb-4">
            <i data-lucide="alert-triangle" style="width:40px;height:40px;color:#e11d48;"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">
            Une erreur est survenue
        </h1>
        <p class="text-sm text-gray-500 mt-2">
            <span th:if="${status}" th:text="${status}">500</span>
            <span th:if="${error}" th:text="${error}">Erreur interne</span>
        </p>
        <p class="text-sm text-gray-600 mt-4" th:if="${message}" th:text="${message}"></p>
        <a th:href="@{/dashboard}" class="btn btn-primary" style="display:inline-flex; margin-top:1.5rem;">Retour au tableau de bord</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
