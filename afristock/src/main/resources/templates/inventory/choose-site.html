<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Nouvel inventaire — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Nouvel inventaire — Afristock" class="max-w-lg mx-auto">
        <header class="mb-8"><h1 class="text-2xl font-bold text-gray-900">Nouvel inventaire</h1>
            <p class="text-sm text-gray-500 mt-1">Choisissez le site à inventorier.</p></header>

        <form th:action="@{/inventory/count}" method="get" class="card p-8 space-y-5">
            <div>
                <label class="form-label">Site</label>
                <select name="siteId" required class="form-input">
                    <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}">Site</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">Commencer le comptage</button>
                <a th:href="@{/inventory}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
