<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Détail inventaire — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Détail inventaire — Afristock" class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900" th:text="'Inventaire — ' + ${session.site.name}">Inventaire</h1>
                <p class="text-sm text-gray-500 mt-1" th:text="${#temporals.format(session.countedAt, 'dd/MM/yyyy HH:mm')} + ' — ' + (${session.note} ?: '')">Date</p>
            </div>
            <a th:href="@{/inventory}" class="btn btn-secondary"><i data-lucide="arrow-left"></i> Inventaires</a>
        </header>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Produit</th><th class="text-right">Avant</th><th class="text-right">Compté</th><th class="text-right">Écart</th></tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${session.lines}">
                        <td class="font-semibold text-gray-900" th:text="${l.product.name}">Produit</td>
                        <td class="text-right text-gray-500" th:text="${l.previousQuantity}">0</td>
                        <td class="text-right text-gray-900" th:text="${l.countedQuantity}">0</td>
                        <td class="text-right font-bold"
                            th:classappend="${l.difference < 0} ? 'text-red-600' : (${l.difference > 0} ? 'text-green-600' : 'text-gray-400')"
                            th:text="${l.difference > 0 ? '+' : ''} + ${l.difference}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
