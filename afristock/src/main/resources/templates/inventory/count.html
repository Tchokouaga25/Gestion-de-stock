<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Comptage — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Comptage — Afristock" class="max-w-3xl mx-auto">
        <header class="mb-8"><h1 class="text-2xl font-bold text-gray-900" th:text="'Comptage — ' + ${site.name}">Comptage</h1>
            <p class="text-sm text-gray-500 mt-1">Saisissez la quantité réelle comptée. Elle remplacera le stock théorique.</p></header>

        <form th:action="@{/inventory/save}" method="post" class="card p-6">
            <input type="hidden" name="siteId" th:value="${site.id}"/>
            <div class="mb-4">
                <input type="text" name="note" placeholder="Note (optionnel)" class="form-input"/>
            </div>
            <div class="table-shell mb-4">
                <table>
                    <thead>
                        <tr><th>Produit</th><th class="text-right w-32">Stock théorique</th><th class="text-right w-40">Compté</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="l : ${levels}">
                            <td th:text="${l.product.name}">Produit
                                <input type="hidden" name="productId" th:value="${l.product.id}"/>
                            </td>
                            <td class="text-right" th:text="${l.quantity}">0</td>
                            <td class="text-right">
                                <input type="number" name="counted" min="0" th:value="${l.quantity}" class="form-input text-right" style="width: 7rem; display: inline-block;"/>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(levels)}"><td colspan="3" class="table-empty">Aucun stock défini pour ce site. Définissez d'abord des quantités via « Stock par site ».</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="flex gap-3">
                <button type="submit" th:disabled="${#lists.isEmpty(levels)}" class="btn btn-primary disabled:opacity-40">Valider l'inventaire</button>
                <a th:href="@{/inventory}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
