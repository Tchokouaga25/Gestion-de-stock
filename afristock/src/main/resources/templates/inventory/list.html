<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Inventaires — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Inventaires — Afristock" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Inventaires</h1>
                <p class="text-sm text-gray-500 mt-1">Comptages physiques et ajustements par site.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/stock}" class="btn btn-secondary">Stock</a>
                <a th:href="@{/inventory/new}" sec:authorize="hasAuthority('STOCK_WRITE')"
                   class="btn btn-primary"><i data-lucide="plus"></i> Nouvel inventaire</a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Date</th><th>Site</th><th>Note</th><th class="text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${sessions}">
                        <td th:text="${#temporals.format(s.countedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="font-semibold text-gray-900" th:text="${s.site.name}">Site</td>
                        <td th:text="${s.note}">Note</td>
                        <td class="text-right"><a th:href="@{/inventory/{id}(id=${s.id})}" class="btn-ghost-info">Détail</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sessions)}"><td colspan="4" class="table-empty">Aucun inventaire.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
