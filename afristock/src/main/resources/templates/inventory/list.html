<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaires — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Inventaires</h1>
                <p class="text-sm text-gray-500 mt-1">Comptages physiques et ajustements par site.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/stock}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Stock</a>
                <a th:href="@{/inventory/new}" sec:authorize="hasAuthority('STOCK_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouvel inventaire</a>
            </div>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Date</th><th class="px-6 py-4">Site</th><th class="px-6 py-4">Note</th><th class="px-6 py-4 text-right">Action</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="s : ${sessions}">
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(s.countedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${s.site.name}">Site</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.note}">Note</td>
                        <td class="px-6 py-4 text-right"><a th:href="@{/inventory/{id}(id=${s.id})}" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Détail</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sessions)}"><td colspan="4" class="px-6 py-10 text-center text-gray-400">Aucun inventaire.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
