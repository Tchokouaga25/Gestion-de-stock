<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comptabilité — Afristock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F8F9FD; } </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Comptabilité — Trésorerie</h1>
                <p class="text-sm text-gray-500 mt-1">Journal des recettes et dépenses, soldes caisse & banque.</p>
            </div>
            <a th:href="@{/dashboard}" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium">Tableau de bord</a>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Recettes</div><div class="text-xl font-bold text-green-600 mt-1" th:text="${#numbers.formatDecimal(summary.recettes, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Dépenses</div><div class="text-xl font-bold text-red-600 mt-1" th:text="${#numbers.formatDecimal(summary.depenses, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Résultat</div><div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.resultat, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Solde caisse</div><div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.soldeCaisse, 0, 0)}">0</div></div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-xs text-gray-400 uppercase tracking-widest">Solde banque</div><div class="text-xl font-bold text-gray-900 mt-1" th:text="${#numbers.formatDecimal(summary.soldeBanque, 0, 0)}">0</div></div>
        </div>

        <form th:action="@{/accounting}" method="post" sec:authorize="hasAuthority('ACCOUNTING_WRITE')"
              class="bg-white rounded-2xl border border-gray-100 p-6 mb-6 grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Nature</label>
                <select name="type" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.name() == 'RECETTE'} ? 'Recette' : 'Dépense'">Type</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Compte</label>
                <select name="account" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm">
                    <option th:each="a : ${accounts}" th:value="${a}" th:text="${a}">Compte</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Catégorie</label>
                <input type="text" name="category" placeholder="ex: Loyer" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Montant</label>
                <input type="number" name="amount" min="1" step="1" required class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Date</label>
                <input type="date" name="entryDate" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm"/>
            </div>
            <button type="submit" class="px-4 py-2.5 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">Ajouter</button>
        </form>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr><th class="px-6 py-4">Date</th><th class="px-6 py-4">Nature</th><th class="px-6 py-4">Compte</th><th class="px-6 py-4">Catégorie</th><th class="px-6 py-4">Description</th><th class="px-6 py-4 text-right">Montant</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="e : ${entries}">
                        <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(e.entryDate, 'dd/MM/yyyy')}">Date</td>
                        <td class="px-6 py-4">
                            <span th:if="${e.type.name() == 'RECETTE'}" class="text-green-600 text-xs font-bold">Recette</span>
                            <span th:unless="${e.type.name() == 'RECETTE'}" class="text-red-600 text-xs font-bold">Dépense</span>
                        </td>
                        <td class="px-6 py-4 text-gray-600" th:text="${e.account}">Compte</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${e.category}">Catégorie</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${e.description}">Description</td>
                        <td class="px-6 py-4 text-right font-bold" th:classappend="${e.type.name() == 'RECETTE'} ? 'text-green-600' : 'text-red-600'"
                            th:text="(${e.type.name() == 'RECETTE'} ? '+' : '-') + ${#numbers.formatDecimal(e.amount, 0, 0)}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(entries)}"><td colspan="6" class="px-6 py-10 text-center text-gray-400">Aucune écriture.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
