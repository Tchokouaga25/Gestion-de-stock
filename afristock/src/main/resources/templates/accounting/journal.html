<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Comptabilité — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Comptabilité — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Comptabilité — Trésorerie</h1>
                <p class="text-sm text-gray-500 mt-1">Journal des recettes et dépenses, soldes caisse & banque.</p>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="stat-tile">
                <div class="stat-tile__icon bg-emerald-50 text-emerald-600"><i data-lucide="trending-up"></i></div>
                <p class="stat-tile__label">Recettes</p>
                <p class="stat-tile__value text-emerald-600" th:text="${#numbers.formatDecimal(summary.recettes, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-red-50 text-red-600"><i data-lucide="trending-down"></i></div>
                <p class="stat-tile__label">Dépenses</p>
                <p class="stat-tile__value text-red-600" th:text="${#numbers.formatDecimal(summary.depenses, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-purple-50 text-purple-600"><i data-lucide="scale"></i></div>
                <p class="stat-tile__label">Résultat</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.resultat, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-blue-50 text-blue-600"><i data-lucide="wallet"></i></div>
                <p class="stat-tile__label">Solde caisse</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.soldeCaisse, 0, 0)}">0</p>
            </div>
            <div class="stat-tile">
                <div class="stat-tile__icon bg-orange-50 text-orange-600"><i data-lucide="landmark"></i></div>
                <p class="stat-tile__label">Solde banque</p>
                <p class="stat-tile__value" th:text="${#numbers.formatDecimal(summary.soldeBanque, 0, 0)}">0</p>
            </div>
        </div>

        <form th:action="@{/accounting}" method="post" sec:authorize="hasAuthority('ACCOUNTING_WRITE')"
              class="card p-6 mb-6 grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
            <div>
                <label class="form-label">Nature</label>
                <select name="type" class="form-input">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.name() == 'RECETTE'} ? 'Recette' : 'Dépense'">Type</option>
                </select>
            </div>
            <div>
                <label class="form-label">Compte</label>
                <select name="account" class="form-input">
                    <option th:each="a : ${accounts}" th:value="${a}" th:text="${a}">Compte</option>
                </select>
            </div>
            <div>
                <label class="form-label">Catégorie</label>
                <input type="text" name="category" placeholder="ex: Loyer" class="form-input"/>
            </div>
            <div>
                <label class="form-label">Montant</label>
                <input type="number" name="amount" min="1" step="1" required class="form-input"/>
            </div>
            <div>
                <label class="form-label">Date</label>
                <input type="date" name="entryDate" class="form-input"/>
            </div>
            <button type="submit" class="btn btn-primary">
                <i data-lucide="plus"></i> Ajouter
            </button>
        </form>

        <div class="table-shell">
            <table>
                <thead>
                    <tr><th>Date</th><th>Nature</th><th>Compte</th><th>Catégorie</th><th>Description</th><th class="text-right">Montant</th></tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${entries}">
                        <td th:text="${#temporals.format(e.entryDate, 'dd/MM/yyyy')}">Date</td>
                        <td>
                            <span th:if="${e.type.name() == 'RECETTE'}" class="badge badge-success">Recette</span>
                            <span th:unless="${e.type.name() == 'RECETTE'}" class="badge badge-danger">Dépense</span>
                        </td>
                        <td th:text="${e.account}">Compte</td>
                        <td th:text="${e.category}">Catégorie</td>
                        <td th:text="${e.description}">Description</td>
                        <td class="text-right font-bold" th:classappend="${e.type.name() == 'RECETTE'} ? 'text-green-600' : 'text-red-600'"
                            th:text="(${e.type.name() == 'RECETTE'} ? '+' : '-') + ${#numbers.formatDecimal(e.amount, 0, 0)}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(entries)}"><td colspan="6" class="table-empty">Aucune écriture.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
