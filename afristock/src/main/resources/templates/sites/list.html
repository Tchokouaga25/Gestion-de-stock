<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Sites — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Sites — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Sites</h1>
                <p class="text-sm text-gray-500 mt-1">Boutiques et entrepôts de votre entreprise.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/sites/add}" sec:authorize="hasAuthority('SITE_WRITE')"
                   class="btn btn-primary">
                    <i data-lucide="plus"></i> Nouveau site
                </a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div th:if="${#lists.isEmpty(siteStats)}" class="card p-10 text-center text-gray-400">
            Aucun site. Créez votre première boutique ou votre entrepôt.
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="workspace-card" th:each="stat : ${siteStats}" th:with="s=${stat.site()}">
                <div class="workspace-card__header">
                    <div>
                        <p class="workspace-card__title" th:text="${s.name}">Nom</p>
                        <p class="text-12 text-gray-400 mt-1" th:text="${s.city}">Ville</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span th:if="${s.type.name() == 'ENTREPOT'}" class="badge badge-warning">Entrepôt</span>
                        <span th:unless="${s.type.name() == 'ENTREPOT'}" class="badge badge-info">Boutique</span>
                        <span th:if="${s.active}" class="badge badge-success">Actif</span>
                        <span th:unless="${s.active}" class="badge badge-neutral">Inactif</span>
                    </div>
                </div>
                <div class="workspace-card__body">
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div>
                            <p class="text-10 text-gray-400 uppercase font-bold tracking-wide">Ventes du mois</p>
                            <p class="font-bold text-gray-900" th:text="${#numbers.formatDecimal(stat.revenueThisMonth(), 0, 0)} + ' F'">0 F</p>
                        </div>
                        <div>
                            <p class="text-10 text-gray-400 uppercase font-bold tracking-wide">Alertes stock</p>
                            <p class="font-bold" th:classappend="${stat.lowStockAlerts() > 0} ? 'text-red-600' : 'text-gray-900'" th:text="${stat.lowStockAlerts()}">0</p>
                        </div>
                        <div>
                            <p class="text-10 text-gray-400 uppercase font-bold tracking-wide">Personnel</p>
                            <p class="font-bold text-gray-900" th:text="${stat.staffCount()}">0</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a th:href="@{/sites/edit/{id}(id=${s.id})}" sec:authorize="hasAuthority('SITE_WRITE')"
                           class="btn-ghost flex-1 text-center">Modifier</a>
                        <form th:action="@{/sites/delete/{id}(id=${s.id})}" method="post" class="flex-1"
                              sec:authorize="hasAuthority('SITE_DELETE')"
                              onsubmit="return confirm('Supprimer ce site ?');">
                            <button class="btn-ghost-danger w-full">Supprimer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
