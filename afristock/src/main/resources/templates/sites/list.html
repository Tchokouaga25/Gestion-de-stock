<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: pageHead('Sites — Afristock')}"></head>
<body class="flex">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main id="main-content" class="ml-[260px] flex-1 p-10">
    <div th:fragment="content" data-title="Sites — Afristock" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Sites</h1>
                <p class="text-sm text-gray-500 mt-1">Boutiques et entrepôts de votre entreprise.</p>
            </div>
            <div class="flex gap-3">
                <a th:href="@{/sites/add}" sec:authorize="hasAuthority('SITE_WRITE')"
                   class="px-4 py-2 text-white rounded-xl text-sm font-medium" style="background-color:#3341ff">+ Nouveau site</a>
            </div>
        </header>

        <div th:if="${success}" class="mb-4 px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-700 text-sm" th:text="${error}"></div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Nom</th>
                        <th class="px-6 py-4">Type</th>
                        <th class="px-6 py-4">Ville</th>
                        <th class="px-6 py-4">Téléphone</th>
                        <th class="px-6 py-4">Statut</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="s : ${sites}">
                        <td class="px-6 py-4 font-semibold text-gray-900" th:text="${s.name}">Nom</td>
                        <td class="px-6 py-4">
                            <span th:if="${s.type.name() == 'ENTREPOT'}" class="px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 text-xs font-bold">Entrepôt</span>
                            <span th:unless="${s.type.name() == 'ENTREPOT'}" class="px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold">Boutique</span>
                        </td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.city}">Ville</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.phone}">Téléphone</td>
                        <td class="px-6 py-4">
                            <span th:if="${s.active}" class="text-green-600 text-xs font-bold">Actif</span>
                            <span th:unless="${s.active}" class="text-gray-400 text-xs font-bold">Inactif</span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <a th:href="@{/sites/edit/{id}(id=${s.id})}" sec:authorize="hasAuthority('SITE_WRITE')"
                               class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium">Modifier</a>
                            <form th:action="@{/sites/delete/{id}(id=${s.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('SITE_DELETE')"
                                  onsubmit="return confirm('Supprimer ce site ?');">
                                <button class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-medium">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sites)}">
                        <td colspan="6" class="px-6 py-10 text-center text-gray-400">Aucun site. Créez votre première boutique ou votre entrepôt.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </main>
</body>
</html>
